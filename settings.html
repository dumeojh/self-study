<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 시스템 환경설정</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #007bff; --danger: #dc3545; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f9; margin: 0; padding: 0; }
        
        /* 🔐 보안 레이어 스타일 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .auth-box { 
            background: white; padding: 40px; border-radius: 15px; text-align: center; 
            width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        .auth-box input { 
            width: 100%; padding: 12px; font-size: 24px; text-align: center; 
            border: 2px solid #ddd; border-radius: 8px; margin: 20px 0; box-sizing: border-box;
        }

        /* 메인 컨텐츠 (인증 전 숨김) */
        #main-content { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .btn-danger { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2>🔒 관리자 인증</h2>
        <p>환경설정 진입을 위해<br>비밀번호를 입력하세요.</p>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" style="flex: 2;" onclick="checkPass()">확인</button>
            <button class="btn btn-gray" style="flex: 1;" onclick="location.href='split_admin.html'">취소</button>
        </div>
    </div>
</div>

<div id="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>⚙️ 시스템 환경설정</h1>
        <button class="btn btn-gray" onclick="location.href='split_admin.html'">⬅️ 관리 화면으로 돌아가기</button>
    </div>

    <div class="card">
        <h3>🪑 좌석 도면 설계 및 명단 관리</h3>
        <p>여기에 기존에 사용하시던 도면 설계 기능과 명단 관리 기능을 넣으시면 됩니다.</p>
        </div>
    
    </div>

<script>
    // --- 파이어베이스 설정 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 🔐 비밀번호 체크 로직
    function checkPass() {
        const input = document.getElementById('pass-input').value;
        if(input === "1234") {
            // 인증 성공: 오버레이 제거 및 컨텐츠 표시
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            // 데이터 로딩 시작 함수 호출 (필요시)
        } else {
            alert("비밀번호가 올바르지 않습니다.");
            document.getElementById('pass-input').value = "";
            document.getElementById('pass-input').focus();
        }
    }

    // 엔터키 지원
    document.getElementById('pass-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') checkPass();
    });
</script>
</body>
</html>
