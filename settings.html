<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 시스템 환경설정</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f9; margin: 0; padding: 0; }
        
        /* 🔐 보안 레이어 스타일 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .auth-box { 
            background: white; padding: 40px; border-radius: 15px; text-align: center; 
            width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        .auth-box input { 
            width: 100%; padding: 12px; font-size: 24px; text-align: center; 
            border: 2px solid #ddd; border-radius: 8px; margin: 20px 0; box-sizing: border-box;
        }

        /* 메인 컨텐츠 영역 */
        #main-content { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 탭 버튼 스타일 */
        .settings-menu { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .menu-btn { 
            flex: 1; min-width: 150px; padding: 15px; font-size: 16px; font-weight: bold; 
            border: none; border-radius: 10px; cursor: pointer; background: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; color: #555;
        }
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .menu-btn.active { background: var(--primary); color: white; }

        /* 설정 카드 스타일 */
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; display: none; }
        .card.active { display: block; animation: fadeIn 0.4s ease; }

        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gray { background: #6c757d; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2>🔒 관리자 인증</h2>
        <p>환경설정 진입을 위해<br>비밀번호를 입력하세요.</p>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" style="flex: 2;" onclick="checkPass()">확인</button>
            <button class="btn btn-gray" style="flex: 1;" onclick="location.href='split_admin.html'">취소</button>
        </div>
    </div>
</div>

<div id="main-content">
    <div class="header">
        <h1>⚙️ 시스템 환경설정</h1>
        <button class="btn btn-gray" onclick="location.href='split_admin.html'">⬅️ 나가기</button>
    </div>

    <div class="settings-menu">
        <button class="menu-btn active" onclick="showTab('tab-period', this)">📅 신청기간 설정</button>
        <button class="menu-btn" onclick="showTab('tab-roster', this)">⚙️ 기초명단 관리</button>
        <button class="menu-btn" onclick="showTab('tab-seats', this)">🪑 좌석도면 설계</button>
        <button class="menu-btn" onclick="showTab('tab-time', this)">⏰ 야자시간 설정</button>
    </div>

    <div id="tab-period" class="card active">
        <h3>신청 가능 기간 설정</h3>
        <p>학생들이 야간 자율학습을 신청할 수 있는 시작일과 종료일을 설정합니다.</p>
        </div>

    <div id="tab-roster" class="card">
        <h3>기초 명단 관리 (엑셀 업로드)</h3>
        <p>전체 학생 명단을 엑셀 파일로 일괄 등록하거나 수정합니다.</p>
        </div>

    <div id="tab-seats" class="card">
        <h3>좌석 도면 설계기</h3>
        <p>자율학습실의 좌석 배치와 번호를 편집합니다.</p>
        </div>

    <div id="tab-time" class="card">
        <h3>야자 교시 시간 설정</h3>
        <p>1T, 2T, 3T 각 타임의 시작 및 종료 시간을 관리합니다.</p>
        </div>
</div>

<script>
    // --- 파이어베이스 설정 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 🔐 비밀번호 체크 로직
    function checkPass() {
        const input = document.getElementById('pass-input').value;
        if(input === "1234") {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        } else {
            alert("비밀번호가 올바르지 않습니다.");
            document.getElementById('pass-input').value = "";
            document.getElementById('pass-input').focus();
        }
    }

    // 탭 전환 기능
    function showTab(tabId, btn) {
        // 모든 카드 숨기기
        document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
        // 모든 버튼 비활성화
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        
        // 선택한 탭 보여주기
        document.getElementById(tabId).classList.add('active');
        // 선택한 버튼 활성화
        btn.classList.add('active');
    }

    // 엔터키 지원
    document.getElementById('pass-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') checkPass();
    });
</script>
</body>
</html>
