<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 시스템 환경설정</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #007bff; --bg: #f4f7f9; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        
        /* 초기 인증 화면 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .auth-box { text-align: center; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .auth-box input { width: 200px; padding: 12px; font-size: 20px; text-align: center; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; }

        /* 메인 컨텐츠 (인증 전까지 숨김) */
        #main-body { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid #ccc; background: white; }

        .info-box { background: #eef6ff; padding: 15px; border-radius: 8px; font-size: 14px; color: #444; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2>🔒 환경설정 보안 인증</h2>
        <p>관리자 비밀번호를 입력하세요.</p>
        <input type="password" id="pass-input" placeholder="비밀번호"> <br>
        <button class="btn btn-primary" style="width: 100%;" onclick="checkPass()">인증 및 진입</button>
        <p style="font-size: 12px; color: #999; margin-top: 15px;">안성여고 교육과정부</p>
    </div>
</div>

<div id="main-body">
    <div class="header">
        <h1>⚙️ 시스템 환경설정</h1>
        <button class="btn btn-outline" onclick="location.href='split_admin.html'">⬅️ 돌아가기</button>
    </div>

    <div class="card">
        <h3>📋 학생 명단 일괄 등록 (엑셀)</h3>
        <div class="info-box">
            엑셀 파일의 첫 줄은 <b>[학번, 이름]</b> 순서로 되어 있어야 합니다. <br>
            등록 시 기존 데이터에 덮어쓰거나 추가됩니다.
        </div>
        <input type="file" id="excel-file" accept=".xlsx, .xls" style="margin-bottom: 10px;">
        <button class="btn btn-primary" onclick="uploadExcel()">데이터 일괄 업로드</button>
    </div>

    <div class="card">
        <h3>⏰ 자율학습 시간 교시 설정</h3>
        <div id="time-settings-area">
            <table>
                <thead>
                    <tr><th>교시</th><th>시작 시간</th><th>종료 시간</th></tr>
                </thead>
                <tbody id="time-table-body">
                    </tbody>
            </table>
        </div>
        <button class="btn btn-primary" style="margin-top: 15px;" onclick="saveTimeSettings()">시간 설정 저장</button>
    </div>

    <div class="card" style="border: 1px solid #ffcccc;">
        <h3 style="color: #d9534f;">⚠️ 데이터 초기화</h3>
        <p>새 학기 시작 시 모든 신청 내역을 삭제합니다. 이 작업은 되돌릴 수 없습니다.</p>
        <button class="btn" style="background: #d9534f; color: white;" onclick="resetAllData()">전체 신청 데이터 초기화</button>
    </div>
</div>

<script>
    // --- 파이어베이스 설정 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 🔐 비밀번호 체크 및 초기 실행
    function checkPass() {
        const input = document.getElementById('pass-input').value;
        if(input === "1234") {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-body').style.display = 'block';
            
            // 엑셀 라이브러리 로드 확인
            if (typeof XLSX === 'undefined') {
                alert("경고: 엑셀 라이브러리가 차단되었습니다. 브라우저의 '추적 방지'를 해제해주세요.");
            }
            
            loadInitialData();
        } else {
            alert("비밀번호가 틀렸습니다!");
            document.getElementById('pass-input').value = "";
        }
    }

    // 엔터키 지원
    document.getElementById('pass-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPass(); });

    // 초기 데이터 로딩
    function loadInitialData() {
        renderTimeTable();
        // 필요 시 서버에서 기존 설정값을 가져오는 로직 추가
    }

    // 시간 설정 테이블 렌더링 (1~3타임)
    function renderTimeTable() {
        const tbody = document.getElementById('time-table-body');
        tbody.innerHTML = "";
        for(let i=1; i<=3; i++) {
            tbody.innerHTML += `
                <tr>
                    <td>${i}타임</td>
                    <td><input type="time" id="start-${i}" class="time-input"></td>
                    <td><input type="time" id="end-${i}" class="time-input"></td>
                </tr>
            `;
        }
    }

    // 엑셀 업로드 로직
    function uploadExcel() {
        const fileInput = document.getElementById('excel-file');
        const file = fileInput.files[0];
        if(!file) return alert("파일을 선택해주세요.");

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                // 파이어베이스 업로드 로직 (예시)
                const batch = db.batch();
                rows.forEach(row => {
                    const docRef = db.collection("students").doc(String(row.학번));
                    batch.set(docRef, { 학번: row.학번, 이름: row.이름 });
                });
                
                batch.commit().then(() => {
                    alert(`${rows.length}명의 명단이 성공적으로 등록되었습니다.`);
                });
            } catch (err) {
                console.error(err);
                alert("엑셀 처리 중 오류가 발생했습니다. 파일 형식을 확인하세요.");
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // 시간 저장
    async function saveTimeSettings() {
        const settings = {};
        for(let i=1; i<=3; i++) {
            settings[`time${i}`] = {
                start: document.getElementById(`start-${i}`).value,
                end: document.getElementById(`end-${i}`).value
            };
        }
        await db.collection("settings").doc("timeConfig").set(settings);
        alert("시간 설정이 서버에 저장되었습니다.");
    }

    // 데이터 초기화
    async function resetAllData() {
        if(!confirm("정말로 '모든' 신청 데이터를 삭제하시겠습니까? 학생들의 신청 내역이 사라집니다.")) return;
        
        const q = await db.collection("applications").get();
        const batch = db.batch();
        q.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        alert("모든 신청 데이터가 초기화되었습니다.");
    }
</script>
</body>
</html>
