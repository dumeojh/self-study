<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 자율학습 관리자 시스템 (고급 도면)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        .tab-menu { display: flex; gap: 5px; margin-bottom: 25px; background: #eee; padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px 8px; text-align: center; }
        th { background: #f8f9fa; color: #495057; }
        tbody tr:hover { background-color: #f1f8ff; cursor: pointer; }
        
        .type-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .fixed { background: #e3f2fd; color: #0d6efd; }
        .flex { background: #e8f5e9; color: #198754; }
        .month-tag { background: #fff3cd; color: #856404; padding: 3px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }

        .form-card { background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #e9ecef; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary); width: 100%; font-size: 16px; padding: 15px; }
        .btn-excel { background: var(--success); }
        .btn-edit { background: var(--warning); color: #212529; font-size: 12px; padding: 5px 10px; }
        .btn-delete { background: var(--danger); font-size: 12px; padding: 5px 10px; }
        .excel-upload-area { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; background: #fff; margin-bottom: 20px; }
        .search-box { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; }

        /* ★ 고급 좌석 배치도 CSS */
        .seat-grid-container { background: #e9ecef; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 15px; border: 1px solid #ddd; overflow-x: auto; max-width: 100%; }
        .seat-grid { display: grid; gap: 3px; justify-content: start; }
        .seat-cell { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 4px; user-select: none; transition: 0.1s; border: 1px solid #ccc; text-align: center; line-height: 1.1; word-break: break-all; overflow: hidden; padding: 2px; box-sizing: border-box; }
        .seat-cell:hover { transform: scale(1.05); border: 2px solid #000; z-index: 10; position: relative; }
        
        /* 팔레트 색상 정의 */
        .seat-0 { background: #fff; color: #fff; border-color: #eee; } /* 통로 */
        .seat-1 { background: #fff3cd; color: #856404; border-color: #ffeeba; } /* 고정석 (노랑) */
        .seat-2 { background: #d1e7dd; color: #0f5132; border-color: #badbcc; } /* 자율석 (초록) */
        .seat-3 { background: #e2e3e5; color: #41464b; border-color: #d3d6d8; } /* 벽 (회색) */
        .seat-4 { background: #cff4fc; color: #055160; border-color: #b6effb; } /* 문 (파랑) */
        .seat-5 { background: #f8d7da; color: #842029; border-color: #f5c2c7; } /* 특수 (빨강) */
        
        .tool-bar { display: flex; gap: 10px; align-items: center; background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; flex-wrap: wrap; }
        .tool-btn { padding: 8px 15px; border: 2px solid transparent; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tool-btn.selected { border: 2px solid #000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h2>안성여고 야간 자율학습 통합 관리자</h2>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab-status', this)">📊 월별 신청 현황</button>
        <button class="tab-btn" onclick="switchTab('tab-manual', this)">📝 개별 수정/추가</button>
        <button class="tab-btn" onclick="switchTab('tab-seats', this)">🪑 고급 좌석 설계</button>
        <button class="tab-btn" onclick="switchTab('tab-roster', this)">⚙️ 기초 명단 관리</button>
    </div>

    <div id="tab-status" class="tab-content active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div>
                <select id="filter-month" onchange="renderStatusTable()" style="padding: 8px; border-radius: 5px; border: 2px solid var(--primary); font-weight: bold;">
                    <option value="all">📅 1년 전체</option><option value="3월">3월</option><option value="4월" selected>4월</option><option value="5월">5월</option><option value="6월">6월</option><option value="7월">7월</option><option value="8월">8월</option><option value="9월">9월</option><option value="10월">10월</option><option value="11월">11월</option><option value="12월">12월</option>
                </select>
                <span id="status-summary" style="font-weight: bold; font-size: 16px; margin-left: 15px;">로딩 중...</span>
            </div>
            <button class="btn btn-excel" onclick="downloadCSV()">CSV 다운로드</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="status-table">
                <thead><tr><th>적용 월</th><th>학번</th><th>이름</th><th>종류</th><th>좌석 번호</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th></tr></thead>
                <tbody id="status-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-manual" class="tab-content">
        <div class="form-card">
            <h3>학생 정보 직접 관리</h3>
            <input type="hidden" id="edit-doc-id">
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;"><label>적용 월</label><select id="m-targetMonth"><option value="3월">3월</option><option value="4월">4월</option><option value="5월">5월</option><option value="6월">6월</option><option value="7월">7월</option><option value="8월">8월</option><option value="9월">9월</option><option value="10월">10월</option><option value="11월">11월</option><option value="12월">12월</option></select></div>
                <div class="form-group" style="flex: 1;"><label>학번</label><input type="number" id="m-id"></div>
                <div class="form-group" style="flex: 1;"><label>이름</label><input type="text" id="m-name"></div>
                <div class="form-group" style="flex: 1;"><label>종류</label><select id="m-type"><option value="고정석">고정석</option><option value="자율석">자율석</option></select></div>
                <div class="form-group" style="flex: 1;"><label>좌석 번호</label><input type="text" id="m-seatNum" placeholder="예: 83"></div>
            </div>
            <div class="form-group">
                <label>요일별 타임 (예: 1,2)</label>
                <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;">
                    <input type="text" id="m-mon" placeholder="월"><input type="text" id="m-tue" placeholder="화"><input type="text" id="m-wed" placeholder="수"><input type="text" id="m-thu" placeholder="목"><input type="text" id="m-fri" placeholder="금"><input type="text" id="m-sat" placeholder="토"><input type="text" id="m-sun" placeholder="일">
                </div>
            </div>
            <button class="btn btn-primary" onclick="saveManualEntry()">저장 / 수정하기</button>
            <button class="btn" style="background:var(--gray); width:100%; margin-top:10px;" onclick="resetManualForm()">입력창 비우기</button>
        </div>
    </div>

    <div id="tab-seats" class="tab-content">
        <div class="form-card">
            <h3>자율학습실 구조 설계기</h3>
            
            <div style="margin-bottom: 15px;">
                가로(열): <input type="number" id="grid-cols" value="15" style="width: 60px; padding: 5px;"> 칸 X 
                세로(행): <input type="number" id="grid-rows" value="10" style="width: 60px; padding: 5px;"> 칸
                <button class="btn btn-edit" style="margin-left: 10px;" onclick="initializeGrid()">격자 새로 생성</button>
                <span style="font-size: 12px; color: red; margin-left:10px;">(주의: 기존 도면이 지워집니다)</span>
            </div>

            <div class="tool-bar">
                <strong style="margin-right: 10px;">🎨 그리기 도구:</strong>
                <button class="tool-btn seat-0 selected" onclick="selectTool(0, this)">⬜ 통로(지우개)</button>
                <button class="tool-btn seat-1" onclick="selectTool(1, this)">🟨 고정석</button>
                <button class="tool-btn seat-2" onclick="selectTool(2, this)">🟩 자율구역</button>
                <button class="tool-btn seat-3" onclick="selectTool(3, this)">⬛ 벽/기둥</button>
                <button class="tool-btn seat-4" onclick="selectTool(4, this)">🟦 출입문</button>
                <button class="tool-btn seat-5" onclick="selectTool(5, this)">🟥 특수(스터디룸)</button>
            </div>
            
            <div style="background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; font-size: 13px; margin-bottom: 15px;">
                💡 <strong>사용법:</strong> 도구를 선택하고 아래 칸을 클릭하여 색칠하세요. <strong>색칠된 칸을 한 번 더 클릭하면 글자(예: 좌석번호, 입구)를 적을 수 있습니다.</strong><br>
                (큰 공간은 여러 칸을 같은 색으로 칠하고, 가운데 칸에만 글자를 적어두면 예쁩니다.)
            </div>

            <div class="seat-grid-container">
                <div id="seat-grid" class="seat-grid"></div>
            </div>
            
            <br>
            <button class="btn btn-primary" style="margin-top: 20px;" onclick="saveSeatLayout()">🌐 이 도면을 서버에 배포하기</button>
        </div>
    </div>

    <div id="tab-roster" class="tab-content">
        <div class="excel-upload-area">
            <h3>엑셀로 전체 명단 올리기</h3>
            <input type="file" id="excel-input" accept=".xlsx, .xls, .csv">
            <button class="btn btn-excel" onclick="handleExcelUpload()">서버에 등록</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <h3>현재 등록 명단 (<span id="roster-count">0</span>명)</h3>
            <input type="text" id="roster-search" class="search-box" placeholder="이름 검색" oninput="displayRoster()">
        </div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table><thead><tr><th>학번</th><th>이름</th><th>관리</th></tr></thead><tbody id="roster-body"></tbody></table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentRoster = {}; 
    let applicationData = {}; 

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        
        if (tabId === 'tab-roster') fetchRoster();
        if (tabId === 'tab-seats') loadSeatLayout(); 
    }

    // [현황 조회]
    db.collection("applications").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        applicationData = {};
        snapshot.forEach(doc => { applicationData[doc.id] = doc.data(); });
        renderStatusTable(); 
    });

    function renderStatusTable() {
        const tbody = document.getElementById('status-body');
        const filterMonth = document.getElementById('filter-month').value;
        tbody.innerHTML = ""; let count = 0;

        for (const docId in applicationData) {
            const data = applicationData[docId];
            if (filterMonth !== "all" && (data.targetMonth || "미지정") !== filterMonth) continue;
            count++;
            tbody.innerHTML += `<tr onclick="fillEditForm('${docId}')">
                <td><span class="month-tag">${data.targetMonth || "미지정"}</span></td>
                <td>${data.stuId}</td><td>${data.stuName}</td>
                <td><span class="type-tag ${data.type === '고정석' ? 'fixed' : 'flex'}">${data.type}</span></td>
                <td style="font-weight:bold; color:#d63384;">${data.seatNum || '-'}</td>
                <td>${data.mon || ''}</td><td>${data.tue || ''}</td><td>${data.wed || ''}</td>
                <td>${data.thu || ''}</td><td>${data.fri || ''}</td><td>${data.sat || ''}</td><td>${data.sun || ''}</td>
            </tr>`;
        }
        document.getElementById('status-summary').innerText = `조회: ${count}명`;
    }

    // [수동 관리]
    function fillEditForm(docId) {
        const d = applicationData[docId];
        document.getElementById('edit-doc-id').value = docId;
        document.getElementById('m-targetMonth').value = d.targetMonth || "3월";
        document.getElementById('m-id').value = d.stuId; document.getElementById('m-name').value = d.stuName;
        document.getElementById('m-type').value = d.type; document.getElementById('m-seatNum').value = d.seatNum || '';
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(day => document.getElementById(`m-${day}`).value = d[day]||'');
        switchTab('tab-manual', document.querySelectorAll('.tab-btn')[1]);
    }

    async function saveManualEntry() {
        const docId = document.getElementById('edit-doc-id').value;
        const p = { targetMonth: document.getElementById('m-targetMonth').value, stuId: document.getElementById('m-id').value, stuName: document.getElementById('m-name').value, type: document.getElementById('m-type').value, seatNum: document.getElementById('m-seatNum').value, timestamp: new Date() };
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(day => p[day] = document.getElementById(`m-${day}`).value);
        try {
            if (docId) await db.collection("applications").doc(docId).update(p); else await db.collection("applications").add(p);
            alert("저장 성공!"); resetManualForm(); switchTab('tab-status', document.querySelectorAll('.tab-btn')[0]);
        } catch(e) { alert("저장 실패: " + e.message); }
    }
    function resetManualForm() { document.getElementById('edit-doc-id').value = ""; document.querySelectorAll('#tab-manual input[type="text"], #tab-manual input[type="number"]').forEach(i => i.value = ""); }

    // --- ★ 고급 좌석 배치도 (객체 데이터 처리) ---
    let seatMapData = []; 
    let rows = 10, cols = 15;
    let currentTool = 0; // 0=통로, 1=고정, 2=자율, 3=벽, 4=문, 5=특수

    function selectTool(typeCode, btnElement) {
        currentTool = typeCode;
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('selected'));
        btnElement.classList.add('selected');
    }

    async function loadSeatLayout() {
        try {
            const doc = await db.collection("settings").doc("seatLayout").get();
            if (doc.exists) {
                const data = doc.data();
                rows = data.rows; cols = data.cols;
                
                // 데이터 파싱 (구버전 호환성 포함)
                const rawGrid = JSON.parse(data.grid);
                seatMapData = rawGrid.map(row => row.map(cell => {
                    return (typeof cell === 'number') ? { type: cell, label: "" } : cell;
                }));

                document.getElementById('grid-rows').value = rows; document.getElementById('grid-cols').value = cols;
                drawSeatGrid();
            } else { initializeGrid(); }
        } catch(e) { console.error("배치도 로드 실패:", e); }
    }

    function initializeGrid() {
        if(seatMapData.length > 0 && !confirm("정말 새로 그리시겠습니까?")) return;
        rows = parseInt(document.getElementById('grid-rows').value) || 10; cols = parseInt(document.getElementById('grid-cols').value) || 15;
        // 빈칸(0) 객체로 배열 초기화
        seatMapData = Array.from({length: rows}, () => Array.from({length: cols}, () => ({ type: 0, label: "" })));
        drawSeatGrid();
    }

    function drawSeatGrid() {
        const container = document.getElementById('seat-grid');
        container.innerHTML = ''; container.style.gridTemplateColumns = `repeat(${cols}, 38px)`;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cellObj = seatMapData[r][c];
                const div = document.createElement('div');
                div.className = `seat-cell seat-${cellObj.type}`;
                div.innerText = cellObj.label || ""; // 글자 렌더링
                div.onclick = () => handleCellClick(r, c);
                container.appendChild(div);
            }
        }
    }

    // ★ 클릭 상호작용 (색칠 & 글자입력)
    function handleCellClick(r, c) {
        const cell = seatMapData[r][c];
        
        if (cell.type === currentTool) {
            // 같은 색상 도구로 이미 칠해진 칸을 누르면 글자 입력창 띄움 (통로 제외)
            if (currentTool !== 0) {
                const newLabel = prompt("이 칸에 표시할 글자(예: 83, 출입문)를 입력하세요:", cell.label);
                if (newLabel !== null) { cell.label = newLabel.trim(); }
            }
        } else {
            // 다른 도구면 덮어쓰기 (글자 초기화)
            cell.type = currentTool;
            cell.label = "";
        }
        drawSeatGrid();
    }

    async function saveSeatLayout() {
        try {
            await db.collection("settings").doc("seatLayout").set({ rows: rows, cols: cols, grid: JSON.stringify(seatMapData), lastUpdated: new Date() });
            alert("✅ 도면이 성공적으로 배포되었습니다!");
        } catch(e) { alert("저장 실패: " + e.message); }
    }

    // [기초 명단]
    async function fetchRoster() { const doc = await db.collection("settings").doc("roster").get(); if (doc.exists) { currentRoster = JSON.parse(doc.data().list || "{}"); displayRoster(); } }
    function displayRoster() {
        const tbody = document.getElementById('roster-body'); const s = document.getElementById('roster-search').value; tbody.innerHTML = ""; let count = 0;
        Object.keys(currentRoster).sort().forEach(id => { const name = currentRoster[id]; if (s && !id.includes(s) && !name.includes(s)) return; count++; tbody.innerHTML += `<tr><td>${id}</td><td>${name}</td><td><button class="btn btn-delete" onclick="deleteRosterItem('${id}')">삭제</button></td></tr>`; });
        document.getElementById('roster-count').innerText = count;
    }
    function deleteRosterItem(id) { if(confirm("삭제?")){ delete currentRoster[id]; db.collection("settings").doc("roster").set({ list: JSON.stringify(currentRoster) }); displayRoster(); } }
    function handleExcelUpload() {
        const reader = new FileReader(); reader.onload = function(e) {
            const data = new Uint8Array(e.target.result); const sheet = XLSX.read(data, {type: 'array'}).Sheets[XLSX.read(data, {type: 'array'}).SheetNames[0]]; const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
            let newRoster = {}; rows.forEach((row, i) => { if (i>0 && row[0]) newRoster[String(row[0]).trim()] = String(row[1]).trim(); });
            currentRoster = newRoster; db.collection("settings").doc("roster").set({ list: JSON.stringify(currentRoster) }); alert("명단 업로드 성공"); displayRoster();
        }; reader.readAsArrayBuffer(document.getElementById('excel-input').files[0]);
    }
    function downloadCSV() {
        const table = document.getElementById("status-table"); let csv = "\uFEFF"; 
        for (let i=0; i<table.rows.length; i++) { let r=[]; for (let j=0; j<table.rows[i].cells.length; j++) r.push('"'+table.rows[i].cells[j].innerText+'"'); csv += r.join(",")+"\r\n"; }
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv;charset=utf-8;'})); link.download = "야간자율학습현황.csv"; link.click();
    }
</script>
