<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 자율학습 관리자 시스템 (좌석배치 포함)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        /* 탭 메뉴 스타일 */
        .tab-menu { display: flex; gap: 5px; margin-bottom: 25px; background: #eee; padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px 8px; text-align: center; }
        th { background: #f8f9fa; color: #495057; }
        tbody tr:hover { background-color: #f1f8ff; cursor: pointer; }
        
        .type-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .fixed { background: #e3f2fd; color: #0d6efd; }
        .flex { background: #e8f5e9; color: #198754; }
        .month-tag { background: #fff3cd; color: #856404; padding: 3px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }

        .form-card { background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #e9ecef; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary); width: 100%; font-size: 16px; padding: 15px; }
        .btn-excel { background: var(--success); }
        .btn-edit { background: var(--warning); color: #212529; font-size: 12px; padding: 5px 10px; }
        .btn-delete { background: var(--danger); font-size: 12px; padding: 5px 10px; }

        .excel-upload-area { border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; background: #fff; margin-bottom: 20px; }
        .search-box { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; }

        /* ★ 좌석 배치도용 CSS 추가 */
        .seat-grid-container { background: #e9ecef; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 15px; border: 1px solid #ddd; }
        .seat-grid { display: grid; gap: 5px; justify-content: center; }
        .seat-cell { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 5px; user-select: none; transition: 0.1s; border: 2px solid transparent; }
        .seat-cell:hover { transform: scale(1.05); }
        .seat-0 { background: #fff; border-color: #ccc; color: #ccc; } /* 빈 곳 */
        .seat-1 { background: #e3f2fd; border-color: #0d6efd; color: #0d6efd; } /* 고정석 */
        .seat-2 { background: #e8f5e9; border-color: #198754; color: #198754; } /* 자율석 */
        .legend-box { display: inline-block; width: 16px; height: 16px; margin-right: 5px; vertical-align: text-bottom; border-radius: 3px; border: 2px solid transparent; }
    </style>
</head>
<body>

<div class="container">
    <h2>안성여고 야간 자율학습 통합 관리자</h2>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab-status', this)">📊 월별 신청 현황</button>
        <button class="tab-btn" onclick="switchTab('tab-manual', this)">📝 개별 수정/추가</button>
        <button class="tab-btn" onclick="switchTab('tab-seats', this)">🪑 좌석 배치도 설정</button>
        <button class="tab-btn" onclick="switchTab('tab-roster', this)">⚙️ 기초 명단 관리</button>
    </div>

    <div id="tab-status" class="tab-content active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div>
                <select id="filter-month" onchange="renderStatusTable()" style="padding: 8px; border-radius: 5px; border: 2px solid var(--primary); font-weight: bold;">
                    <option value="all">📅 1년 전체보기</option>
                    <option value="3월">3월</option><option value="4월" selected>4월</option><option value="5월">5월</option>
                    <option value="6월">6월</option><option value="7월">7월</option><option value="8월">8월</option>
                    <option value="9월">9월</option><option value="10월">10월</option><option value="11월">11월</option>
                    <option value="12월">12월</option>
                </select>
                <span id="status-summary" style="font-weight: bold; font-size: 16px; margin-left: 15px;">데이터 로딩 중...</span>
            </div>
            <button class="btn btn-excel" onclick="downloadCSV()">CSV 엑셀 다운로드</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="status-table">
                <thead>
                    <tr>
                        <th>적용 월</th><th>학번</th><th>이름</th><th>종류</th>
                        <th>좌석 번호</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th>
                    </tr>
                </thead>
                <tbody id="status-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-manual" class="tab-content">
        <div class="form-card">
            <h3>학생 신청 정보 직접 관리</h3>
            <input type="hidden" id="edit-doc-id">
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;"><label>적용 월</label>
                    <select id="m-targetMonth"><option value="3월">3월</option><option value="4월">4월</option><option value="5월">5월</option><option value="6월">6월</option><option value="7월">7월</option><option value="8월">8월</option><option value="9월">9월</option><option value="10월">10월</option><option value="11월">11월</option><option value="12월">12월</option></select>
                </div>
                <div class="form-group" style="flex: 1;"><label>학번</label><input type="number" id="m-id"></div>
                <div class="form-group" style="flex: 1;"><label>이름</label><input type="text" id="m-name"></div>
                <div class="form-group" style="flex: 1;"><label>신청 종류</label>
                    <select id="m-type"><option value="고정석">고정석</option><option value="자율석">자율석</option></select>
                </div>
                <div class="form-group" style="flex: 1;"><label>좌석 번호</label><input type="text" id="m-seatNum" placeholder="예: 1-A"></div>
            </div>

            <div class="form-group">
                <label>요일별 타임 (예: 1,2)</label>
                <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;">
                    <input type="text" id="m-mon" placeholder="월"><input type="text" id="m-tue" placeholder="화"><input type="text" id="m-wed" placeholder="수"><input type="text" id="m-thu" placeholder="목"><input type="text" id="m-fri" placeholder="금"><input type="text" id="m-sat" placeholder="토"><input type="text" id="m-sun" placeholder="일">
                </div>
            </div>
            <button class="btn btn-primary" onclick="saveManualEntry()">저장 / 수정하기</button>
            <button class="btn" style="background:var(--gray); width:100%; margin-top:10px;" onclick="resetManualForm()">입력창 비우기</button>
        </div>
    </div>

    <div id="tab-seats" class="tab-content">
        <div class="form-card" style="text-align: center;">
            <h3>자율학습실 좌석 배치도 설계</h3>
            <p style="color:#666; font-size:14px; margin-bottom: 20px;">
                가로와 세로 칸 수를 정하고, 아래 네모 칸을 클릭하여 좌석 종류를 설정하세요.<br>
                클릭할 때마다 <strong>[빈 공간] ➔ [고정석] ➔ [자율석]</strong> 순으로 변합니다.
            </p>
            
            <div style="margin-bottom: 20px;">
                가로(열): <input type="number" id="grid-cols" value="10" style="width: 70px; padding: 5px; text-align: center;"> 칸 &nbsp;&nbsp;X&nbsp;&nbsp;
                세로(행): <input type="number" id="grid-rows" value="8" style="width: 70px; padding: 5px; text-align: center;"> 칸
                <button class="btn btn-edit" style="font-size: 14px; margin-left: 10px;" onclick="initializeGrid()">격자 새로 그리기</button>
            </div>

            <div style="margin-bottom: 10px; font-size: 14px;">
                <span class="legend-box seat-0"></span> 빈 공간 (통로) &nbsp;&nbsp;&nbsp;
                <span class="legend-box seat-1"></span> 고정석 (1) &nbsp;&nbsp;&nbsp;
                <span class="legend-box seat-2"></span> 자율석 (2)
            </div>

            <div class="seat-grid-container">
                <div id="seat-grid" class="seat-grid">
                    </div>
            </div>
            
            <br>
            <button class="btn btn-primary" style="margin-top: 20px; max-width: 400px;" onclick="saveSeatLayout()">배치도 서버에 배포하기</button>
        </div>
    </div>

    <div id="tab-roster" class="tab-content">
        <div class="excel-upload-area">
            <h3>엑셀로 전체 명단 올리기</h3>
            <input type="file" id="excel-input" accept=".xlsx, .xls, .csv">
            <button class="btn btn-excel" onclick="handleExcelUpload()">서버에 명단 등록</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <h3>현재 등록된 기초 명단 (<span id="roster-count">0</span>명)</h3>
            <input type="text" id="roster-search" class="search-box" placeholder="학번 또는 이름 검색..." oninput="displayRoster()">
        </div>
        <div style="max-height: 500px; overflow-y: auto;">
            <table>
                <thead><tr><th>학번</th><th>이름</th><th>관리</th></tr></thead>
                <tbody id="roster-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentRoster = {}; 
    let applicationData = {}; 

    // --- [탭 공통] ---
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        
        if (tabId === 'tab-roster') fetchRoster();
        if (tabId === 'tab-seats') loadSeatLayout(); // 탭 열릴 때 서버에서 배치도 불러오기
    }

    // --- [현황] ---
    db.collection("applications").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        applicationData = {};
        snapshot.forEach(doc => { applicationData[doc.id] = doc.data(); });
        renderStatusTable(); 
    });

    function renderStatusTable() {
        const tbody = document.getElementById('status-body');
        const filterMonth = document.getElementById('filter-month').value;
        tbody.innerHTML = "";
        let count = 0;

        for (const docId in applicationData) {
            const data = applicationData[docId];
            const targetMonth = data.targetMonth || "미지정";
            if (filterMonth !== "all" && targetMonth !== filterMonth) continue;

            count++;
            const row = `<tr onclick="fillEditForm('${docId}')">
                <td><span class="month-tag">${targetMonth}</span></td>
                <td>${data.stuId}</td><td>${data.stuName}</td>
                <td><span class="type-tag ${data.type === '고정석' ? 'fixed' : 'flex'}">${data.type}</span></td>
                <td style="font-weight:bold; color:#d63384;">${data.seatNum || '-'}</td>
                <td>${data.mon || ''}</td><td>${data.tue || ''}</td><td>${data.wed || ''}</td>
                <td>${data.thu || ''}</td><td>${data.fri || ''}</td><td>${data.sat || ''}</td><td>${data.sun || ''}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
        document.getElementById('status-summary').innerText = `조회 인원: ${count}명`;
    }

    // --- [수정] ---
    function fillEditForm(docId) {
        const data = applicationData[docId];
        document.getElementById('edit-doc-id').value = docId;
        document.getElementById('m-targetMonth').value = data.targetMonth || "3월";
        document.getElementById('m-id').value = data.stuId;
        document.getElementById('m-name').value = data.stuName;
        document.getElementById('m-type').value = data.type;
        document.getElementById('m-seatNum').value = data.seatNum || '';
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(day => { document.getElementById(`m-${day}`).value = data[day] || ''; });
        switchTab('tab-manual', document.querySelectorAll('.tab-btn')[1]);
    }

    async function saveManualEntry() {
        const docId = document.getElementById('edit-doc-id').value;
        const payload = {
            targetMonth: document.getElementById('m-targetMonth').value,
            stuId: document.getElementById('m-id').value,
            stuName: document.getElementById('m-name').value,
            type: document.getElementById('m-type').value,
            seatNum: document.getElementById('m-seatNum').value, // 수동 좌석 수정
            timestamp: new Date()
        };
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(day => { payload[day] = document.getElementById(`m-${day}`).value; });

        try {
            if (docId) await db.collection("applications").doc(docId).update(payload);
            else await db.collection("applications").add(payload);
            alert("성공적으로 저장되었습니다.");
            resetManualForm();
            switchTab('tab-status', document.querySelectorAll('.tab-btn')[0]);
        } catch(e) { alert("저장 실패: " + e.message); }
    }

    function resetManualForm() {
        document.getElementById('edit-doc-id').value = "";
        document.querySelectorAll('#tab-manual input[type="text"], #tab-manual input[type="number"]').forEach(i => i.value = "");
    }

    // --- ★ [좌석 배치도 기능] ---
    let seatMapData = []; 
    let rows = 8;
    let cols = 10;

    async function loadSeatLayout() {
        try {
            const doc = await db.collection("settings").doc("seatLayout").get();
            if (doc.exists) {
                const data = doc.data();
                rows = data.rows; cols = data.cols;
                seatMapData = JSON.parse(data.grid);
                document.getElementById('grid-rows').value = rows;
                document.getElementById('grid-cols').value = cols;
                drawSeatGrid();
            } else {
                initializeGrid(); // 데이터 없으면 빈 격자 생성
            }
        } catch(e) { console.error("배치도 로드 실패:", e); }
    }

    function initializeGrid() {
        if(seatMapData.length > 0 && !confirm("새로 그리면 기존 배치도가 지워집니다. 진행할까요?")) return;
        
        rows = parseInt(document.getElementById('grid-rows').value) || 8;
        cols = parseInt(document.getElementById('grid-cols').value) || 10;
        
        // 2차원 배열(행x열)을 모두 0(빈공간)으로 초기화
        seatMapData = Array.from({length: rows}, () => Array(cols).fill(0));
        drawSeatGrid();
    }

    function drawSeatGrid() {
        const container = document.getElementById('seat-grid');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${cols}, 45px)`; // 열 개수만큼 칸 너비 설정

        // 행열 순회하며 칸 생성
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const val = seatMapData[r][c];
                const cell = document.createElement('div');
                cell.className = `seat-cell seat-${val}`;
                
                // 표기 텍스트
                if (val === 1) cell.innerText = "고정";
                else if (val === 2) cell.innerText = "자율";
                
                cell.onclick = () => toggleSeat(r, c); // 클릭 이벤트
                container.appendChild(cell);
            }
        }
    }

    // 클릭 시 0 -> 1 -> 2 -> 0 순환 로직
    function toggleSeat(r, c) {
        seatMapData[r][c] = (seatMapData[r][c] + 1) % 3;
        drawSeatGrid();
    }

    async function saveSeatLayout() {
        try {
            await db.collection("settings").doc("seatLayout").set({
                rows: rows,
                cols: cols,
                grid: JSON.stringify(seatMapData),
                lastUpdated: new Date()
            });
            alert("✅ 좌석 배치도가 서버에 성공적으로 배포되었습니다!\n\n학생들이 고정석 신청 시 이 배치도를 보게 됩니다.");
        } catch(e) { alert("저장 실패: " + e.message); }
    }

    // --- [기초 명단] (이전 코드 동일 생략) ---
    async function fetchRoster() {
        const doc = await db.collection("settings").doc("roster").get();
        if (doc.exists) { currentRoster = JSON.parse(doc.data().list || "{}"); displayRoster(); }
    }
    function displayRoster() {
        const tbody = document.getElementById('roster-body');
        const search = document.getElementById('roster-search').value;
        tbody.innerHTML = ""; let count = 0;
        Object.keys(currentRoster).sort().forEach(id => {
            const name = currentRoster[id];
            if (search && !id.includes(search) && !name.includes(search)) return;
            count++;
            tbody.innerHTML += `<tr><td>${id}</td><td>${name}</td><td><button class="btn btn-delete" onclick="deleteRosterItem('${id}')">삭제</button></td></tr>`;
        });
        document.getElementById('roster-count').innerText = count;
    }
    function deleteRosterItem(id) { if (confirm("삭제할까요?")) { delete currentRoster[id]; saveRosterToServer("삭제됨"); } }
    async function saveRosterToServer(msg) { await db.collection("settings").doc("roster").set({ list: JSON.stringify(currentRoster) }); alert(msg); displayRoster(); }
    function handleExcelUpload() {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const sheet = XLSX.read(data, {type: 'array'}).Sheets[XLSX.read(data, {type: 'array'}).SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
            let newRoster = {};
            rows.forEach((row, idx) => { if (idx > 0 && row[0]) newRoster[String(row[0]).trim()] = String(row[1]).trim(); });
            currentRoster = newRoster; saveRosterToServer("엑셀 업로드 완료");
        };
        reader.readAsArrayBuffer(document.getElementById('excel-input').files[0]);
    }
    function downloadCSV() {
        const table = document.getElementById("status-table"); let csv = "\uFEFF"; 
        for (let i=0; i<table.rows.length; i++) { let r=[]; for (let j=0; j<table.rows[i].cells.length; j++) r.push('"'+table.rows[i].cells[j].innerText+'"'); csv += r.join(",")+"\r\n"; }
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv;charset=utf-8;'})); link.download = "신청현황.csv"; link.click();
    }
</script>

</body>
</html>
