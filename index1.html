<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 야간 자율학습 신청</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --fixed-bg: #e3f2fd;
            --fixed-text: #1565c0;
            --flex-bg: #f8f9fa;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .type-btn.active[data-type="1"] { background: var(--fixed-bg); border-color: var(--fixed-text); color: var(--fixed-text); }
        .type-btn.active[data-type="0"] { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .schedule-table th { background: #f8f9fa; padding: 10px; font-size: 13px; border: 1px solid #eee; }
        .schedule-table td { padding: 5px; border: 1px solid #eee; text-align: center; }

        .time-chk { display: none; }
        .time-label {
            display: block;
            padding: 8px 0;
            border-radius: 5px;
            background: #eee;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }
        .time-chk:checked + .time-label {
            background: var(--primary);
            color: white;
        }

        #submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #submit-btn:disabled { background: #ccc; }

        .info-msg {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>야간 자율학습 신청</h2>
    
    <div class="input-group">
        <label>학번</label>
        <input type="number" id="stu-id" placeholder="예: 20101" oninput="validateForm()">
    </div>
    <div class="input-group">
        <label>이름</label>
        <input type="text" id="stu-name" placeholder="실명을 입력하세요" oninput="validateForm()">
    </div>

    <label>신청 종류</label>
    <div class="type-selector">
        <button class="type-btn" data-type="1" onclick="selectType(1)">고정석(1)</button>
        <button class="type-btn" data-type="0" onclick="selectType(0)">자율석(0)</button>
    </div>

    <div class="info-msg" id="info-text">
        ※ 고정석은 최소 3일 이상(타임 무관) 선택해야 합니다.
    </div>

    <table class="schedule-table">
        <thead>
            <tr>
                <th>요일</th>
                <th>1타임</th>
                <th>2타임</th>
                <th>3타임</th>
            </tr>
        </thead>
        <tbody id="schedule-body"></tbody>
    </table>

    <button id="submit-btn" onclick="submitForm()" disabled>신청하기</button>
</div>

<script>
    // -----------------------------------------------------------------
    // 1. 파이어베이스 연결 설정
    // -----------------------------------------------------------------
// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
  authDomain: "self-study-project-82bdf.firebaseapp.com",
  projectId: "self-study-project-82bdf",
  storageBucket: "self-study-project-82bdf.firebasestorage.app",
  messagingSenderId: "482006075036",
  appId: "1:482006075036:web:473445e0f86d48cd22cf59"
};


    // 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // -----------------------------------------------------------------
    // 2. 화면 구성 및 기존 로직
    // -----------------------------------------------------------------
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    const daysEng = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    let selectedType = null;

    const tbody = document.getElementById('schedule-body');
    days.forEach((day, idx) => {
        let row = `<tr>
            <td><strong>${day}</strong></td>
            ${[1, 2, 3].map(t => `
                <td>
                    <input type="checkbox" class="time-chk" id="${daysEng[idx]}-${t}" value="${t}" onchange="validateForm()">
                    <label class="time-label" for="${daysEng[idx]}-${t}">${t}T</label>
                </td>
            `).join('')}
        </tr>`;
        tbody.innerHTML += row;
    });

    function selectType(type) {
        selectedType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.type) === type);
        });
        validateForm();
    }

    function validateForm() {
        const id = document.getElementById('stu-id').value;
        const name = document.getElementById('stu-name').value;
        const btn = document.getElementById('submit-btn');
        
        let selectedDays = 0;
        daysEng.forEach(day => {
            if(document.querySelectorAll(`[id^="${day}-"]:checked`).length > 0) selectedDays++;
        });

        const isIdOk = id.length >= 5;
        const isNameOk = name.length >= 2;
        const isTypeOk = selectedType !== null;
        let isConditionOk = true;

        if (selectedType === 1 && selectedDays < 3) isConditionOk = false;

        btn.disabled = !(isIdOk && isNameOk && isTypeOk && isConditionOk);
    }

    // -----------------------------------------------------------------
    // 3. 파이어베이스로 데이터 전송 (핵심 수정 부분)
    // -----------------------------------------------------------------
    async function submitForm() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "전송 중...";
        btn.disabled = true;

        const payload = {
            stuId: document.getElementById('stu-id').value,
            stuName: document.getElementById('stu-name').value,
            type: selectedType === 1 ? "고정석" : "자율석",
            timestamp: new Date() // 신청 시간 자동 기록
        };

        let totalDays = 0;
        daysEng.forEach(day => {
            const checked = Array.from(document.querySelectorAll(`[id^="${day}-"]:checked`)).map(el => el.value);
            payload[day] = checked.join(',');
            if(checked.length > 0) totalDays++;
        });
        payload.dayCount = totalDays;

        try {
            // Firestore의 'applications'라는 폴더(컬렉션)에 데이터를 저장합니다.
            await db.collection("applications").add(payload);
            
            alert("신청이 성공적으로 완료되었습니다!");
            location.reload(); // 성공 시 새로고침
        } catch (e) {
            console.error("전송 에러:", e);
            alert("🚨 신청 실패!\n원인: " + e.message + "\n\n데이터베이스 보안 규칙(테스트 모드)을 확인해 주세요.");
        } finally {
            btn.innerText = "신청하기";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
