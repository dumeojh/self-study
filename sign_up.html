<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 야간 자율학습 신청</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #007bff; --fixed-bg: #e3f2fd; --fixed-text: #1565c0; --flex-bg: #f8f9fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 20px; }
        .notice { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; line-height: 1.5; border-left: 4px solid #ffeeba; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background-color: #f8f9fa; color: #666; }
        .btn-main { width: 100%; padding: 15px; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-search { background: #343a40; } .btn-submit { background: var(--primary); } .btn-update { background: #28a745; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #apply-section { display: none; margin-top: 25px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .type-btn.active[data-type="1"] { background: var(--fixed-bg); border-color: var(--fixed-text); color: var(--fixed-text); }
        .type-btn.active[data-type="0"] { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }

        .schedule-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .schedule-table th { background: #f8f9fa; padding: 10px; font-size: 13px; border: 1px solid #eee; }
        .schedule-table td { padding: 5px; border: 1px solid #eee; text-align: center; }
        .time-chk { display: none; }
        .time-label { display: block; padding: 8px 0; border-radius: 5px; background: #eee; font-size: 12px; cursor: pointer; }
        .time-chk:checked + .time-label { background: var(--primary); color: white; }

        /* ★ 학생용 좌석 배치도 CSS */
        #seat-map-section { display: none; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #dee2e6; }
        .seat-scroll-container { overflow-x: auto; padding: 10px 0; max-width: 100%; }
        .student-seat-grid { display: grid; gap: 3px; justify-content: start; }
        .seat-cell { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-radius: 4px; box-sizing: border-box; text-align: center; line-height: 1.1; overflow: hidden; border: 1px solid #ccc; padding: 2px; }
        
        .seat-empty { background: transparent; border: none; } 
        .seat-static { opacity: 0.8; } /* 벽, 문, 특수 구역 */
        .seat-3 { background: #e2e3e5; color: #41464b; } /* 벽 */
        .seat-4 { background: #cff4fc; color: #055160; } /* 문 */
        .seat-5 { background: #f8d7da; color: #842029; } /* 특수 */
        .seat-2 { background: #d1e7dd; color: #0f5132; border-color: #badbcc; } /* 자율석 구역 */

/* 선택 가능한 고정석 */
        .seat-available { background: white; color: #0d6efd; border: 2px solid #0d6efd; cursor: pointer; transition: 0.2s; }
        .seat-available:hover { background: #e3f2fd; transform: scale(1.1); box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; position: relative; }
        .seat-selected { background: #0d6efd !important; color: white !important; border-color: #0b5ed7; transform: scale(1.1); box-shadow: 0 4px 8px rgba(13,110,253,0.3); z-index: 10; position: relative; }
        
        /* 🌟 [추가] 이미 예약이 완료된 좌석 */
        .seat-taken { background: #e9ecef !important; color: #adb5bd !important; border: 1px solid #ced4da !important; cursor: not-allowed; text-decoration: line-through; opacity: 0.7; }
        
        #selected-seat-display { font-size: 16px; font-weight: bold; color: #d63384; text-align: center; margin-top: 15px; padding: 10px; background: white; border-radius: 8px; border: 2px dashed #d63384; }
    
    </style>
</head>
<body>

<div class="container">
    <h2>야간 자율학습 신청</h2>
    <div class="notice">※ <strong>학번, 이름, 신청월</strong>을 선택하고 조회하세요.</div>

    <div id="search-section">
        <div class="input-group">
            <label>신청 대상 월</label>
            <select id="target-month"><option value="3월">3월 신청</option><option value="4월" selected>4월 신청</option><option value="5월">5월 신청</option><option value="6월">6월 신청</option><option value="7월">7월 신청</option><option value="8월">8월 신청</option><option value="9월">9월 신청</option><option value="10월">10월 신청</option><option value="11월">11월 신청</option><option value="12월">12월 신청</option></select>
        </div>
        <div class="input-group"><label>학번</label><input type="number" id="stu-id" placeholder="예: 20101"></div>
        <div class="input-group"><label>이름</label><input type="text" id="stu-name" placeholder="실명 입력"></div>
        <button id="search-btn" class="btn-main btn-search" onclick="verifyStudent()">조회하기</button>
    </div>

    <div id="apply-section">
        <label>신청 종류</label>
        <div class="type-selector">
            <button class="type-btn" data-type="1" onclick="selectType(1)">고정석(1)</button>
            <button class="type-btn" data-type="0" onclick="selectType(0)">자율석(0)</button>
        </div>

        <div id="seat-map-section">
            <label style="text-align: center; color: #495057; display:block; margin-bottom:10px;">👇 원하는 자리를 클릭하세요 (노란테두리)</label>
            <div class="seat-scroll-container">
                <div id="student-seat-grid" class="student-seat-grid"></div>
            </div>
            <div id="selected-seat-display">선택된 좌석: 없음</div>
        </div>

        <table class="schedule-table">
            <thead><tr><th>요일</th><th>1T</th><th>2T</th><th>3T</th></tr></thead>
            <tbody id="schedule-body"></tbody>
        </table>
        <button id="submit-btn" class="btn-main btn-submit" onclick="submitForm()" disabled>신청하기</button>
    </div>
</div>

<script>
// sign_up.html 스크립트 상단에 추가
async function checkApplyPeriod() {
    const searchBtn = document.getElementById('search-btn');
    const noticeBox = document.querySelector('.notice');

    try {
        const doc = await db.collection("settings").doc("applyPeriod").get();
        if (doc.exists) {
            const data = doc.data();
            const now = new Date();
            const startTime = new Date(data.start);
            const endTime = new Date(data.end);

            if (now < startTime || now > endTime) {
                // 기간이 아닐 때
                searchBtn.disabled = true;
                searchBtn.style.background = "#ccc";
                searchBtn.innerText = "현재는 신청 기간이 아닙니다";
                
                noticeBox.innerHTML = `⚠️ <b>지금은 신청 기간이 아닙니다.</b><br>
                    신청 가능 기간: ${data.start.replace('T', ' ')} ~ ${data.end.replace('T', ' ')}`;
                noticeBox.style.background = "#f8d7da";
                noticeBox.style.color = "#721c24";
                noticeBox.style.borderLeft = "4px solid #dc3545";
            }
        }
    } catch(e) { console.error(e); }
}

// 페이지 로드 시 실행
checkApplyPeriod();



    
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let serverRoster = {}; let selectedType = null; let currentDocId = null; 
    let seatMapData = []; let layoutRows = 0; let layoutCols = 0;
    let selectedSeatId = ""; let previousSavedSeat = "";
// 🌟 [추가] 이미 예약된 좌석들을 담아둘 바구니(배열)
    let takenSeats = [];
    
    const daysEng = ['mon','tue','wed','thu','fri','sat','sun'];

    const tbody = document.getElementById('schedule-body');
    ['월','화','수','목','금','토','일'].forEach((day, idx) => {
        tbody.innerHTML += `<tr><td><strong>${day}</strong></td>${[1,2,3].map(t => `<td><input type="checkbox" class="time-chk" id="${daysEng[idx]}-${t}" value="${t}" onchange="validateForm()"><label class="time-label" for="${daysEng[idx]}-${t}">${t}T</label></td>`).join('')}</tr>`;
    });

    async function fetchInitialData() {
        try {
            const rosterDoc = await db.collection("settings").doc("roster").get();
            if (rosterDoc.exists) serverRoster = JSON.parse(rosterDoc.data().list || "{}");
            
            const layoutDoc = await db.collection("settings").doc("seatLayout").get();
            if (layoutDoc.exists) {
                const data = layoutDoc.data();
                layoutRows = data.rows; layoutCols = data.cols;
                
                // 구버전 호환성 포함 파싱
                const rawGrid = JSON.parse(data.grid);
                seatMapData = rawGrid.map(row => row.map(c => typeof c === 'number' ? {type: c, label: ""} : c));
            }
        } catch(e) { console.error(e); }
    }
    fetchInitialData();

// [수정] 좌석 도면 그리기 (예약된 좌석 표시 로직 추가)
    function buildSeatGrid() {
        const container = document.getElementById('student-seat-grid');
        container.style.gridTemplateColumns = `repeat(${layoutCols}, 35px)`;
        container.innerHTML = '';

        for (let r = 0; r < layoutRows; r++) {
            for (let c = 0; c < layoutCols; c++) {
                const cellData = seatMapData[r][c];
                const div = document.createElement('div');
                div.className = 'seat-cell';
                
                if (cellData.type === 0) {
                    div.classList.add('seat-empty');
                } else if (cellData.type === 1) {
                    const finalLabel = cellData.label || `${r+1}-${c+1}`;
                    div.innerText = finalLabel;
                    
                    // 🌟 [추가 핵심 로직] 이 자리가 누군가 예약한 자리(takenSeats)에 포함되어 있는지 확인
                    if (takenSeats.includes(finalLabel)) {
                        div.classList.add('seat-taken'); // 회색 처리 + 취소선
                        // onclick 이벤트를 달지 않음 -> 클릭해도 아무 반응이 없게 됨
                    } else {
                        // 아직 아무도 예약하지 않은 빈자리
                        div.classList.add('seat-available');
                        div.onclick = () => pickSeat(finalLabel, div);
                        
                        if(previousSavedSeat === finalLabel) pickSeat(finalLabel, div);
                    }
                } else {
                    // 2, 3, 4, 5 (자율구역, 벽, 문, 특수)
                    div.classList.add(`seat-${cellData.type}`, 'seat-static');
                    div.innerText = cellData.label || "";
                }
                container.appendChild(div);
            }
        }
    }
    function pickSeat(label, cellElement) {
        document.querySelectorAll('.seat-cell').forEach(el => el.classList.remove('seat-selected'));
        cellElement.classList.add('seat-selected');
        selectedSeatId = label;
        document.getElementById('selected-seat-display').innerText = `✅ 선택된 좌석: [ ${label} ]`;
        validateForm();
    }


    
async function verifyStudent() {
    // 1. [보안] 버튼 클릭 시점에 서버 시간을 다시 확인하여 기간 외 신청 차단
    const now = new Date();
    try {
        const periodDoc = await db.collection("settings").doc("applyPeriod").get();
        if (periodDoc.exists) {
            const pData = periodDoc.data();
            if (now < new Date(pData.start) || now > new Date(pData.end)) {
                alert("죄송합니다. 현재는 신청 기간이 아닙니다.");
                location.reload(); 
                return;
            }
        }
    } catch(e) { console.error("기간 확인 오류:", e); }

    // 2. 입력값 가져오기
    const id = document.getElementById('stu-id').value.trim(); 
    const name = document.getElementById('stu-name').value.trim(); 
    const month = document.getElementById('target-month').value;

    if (!id || !name) return alert("학번과 이름을 모두 입력해주세요.");
    if (serverRoster[id] !== name) return alert("학번과 이름이 일치하지 않습니다. 명단을 확인해 주세요.");

    document.getElementById('search-btn').innerText = "조회 중...";
    
    try {
        // 3. 본인의 신청 내역 조회
        const q = await db.collection("applications").where("stuId", "==", id).where("targetMonth", "==", month).get();
        
        // 4. 해당 월의 다른 학생들이 예약한 '고정석' 전체 내역 가져오기
        const takenQuery = await db.collection("applications")
            .where("targetMonth", "==", month)
            .where("type", "==", "고정석")
            .get();
        
        takenSeats = []; // 초기화
        
        document.getElementById('apply-section').style.display = 'block'; 
        document.getElementById('search-section').style.display = 'none';

        if (!q.empty) {
            const doc = q.docs[0]; currentDocId = doc.id; const data = doc.data();
            previousSavedSeat = data.seatNum || "";
            
            // 본인을 제외한 다른 학생들의 예약 좌석 수집
            takenQuery.forEach(tDoc => {
                if (tDoc.id !== currentDocId && tDoc.data().seatNum) {
                    takenSeats.push(tDoc.data().seatNum);
                }
            });

            selectType(data.type === "고정석" ? 1 : 0);
            daysEng.forEach(day => { 
                if (data[day]) { 
                    data[day].split(',').forEach(t => { 
                        const chk = document.getElementById(`${day}-${t}`); 
                        if(chk) chk.checked = true; 
                    }); 
                } 
            });
            document.getElementById('submit-btn').innerText = "정보 수정하기";
            document.getElementById('submit-btn').className = "btn-main btn-update";
            alert(`기존 신청 내역을 불러왔습니다.`);
        } else { 
            currentDocId = null; previousSavedSeat = ""; 
            takenQuery.forEach(tDoc => {
                if (tDoc.data().seatNum) takenSeats.push(tDoc.data().seatNum);
            });
            alert(`신규 신청을 진행하세요.`); 
        }
        validateForm();
    } catch(e) { 
        alert("데이터 로드 오류: " + e.message); 
        document.getElementById('search-btn').innerText = "조회하기";
    }
}



    
    function selectType(type) {
        selectedType = type;
        document.querySelectorAll('.type-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.type) === type));
        if(type === 1) { document.getElementById('seat-map-section').style.display = 'block'; buildSeatGrid(); } 
        else { document.getElementById('seat-map-section').style.display = 'none'; selectedSeatId = ""; }
        validateForm();
    }

    function validateForm() {
        let sc = 0; daysEng.forEach(d => { if(document.querySelectorAll(`[id^="${d}-"]:checked`).length > 0) sc++; });
        let ok = true; if (selectedType === 1 && (sc < 3 || selectedSeatId === "")) ok = false;
        document.getElementById('submit-btn').disabled = !(selectedType !== null && ok);
    }

async function submitForm() {
    const btn = document.getElementById('submit-btn'); 
    btn.innerText = "저장 중..."; 
    btn.disabled = true;

    // 1. 검사에 필요한 값들을 먼저 변수에 담아둡니다.
    const targetMonthVal = document.getElementById('target-month').value;
    const typeVal = selectedType === 1 ? "고정석" : "자율석";
    const seatNumVal = selectedType === 1 ? selectedSeatId : "";

    // 🌟 [추가된 핵심 로직] 학생이 고정석을 신청할 때 중복 검사
    if (typeVal === "고정석" && seatNumVal !== "") {
        // 파이어베이스에서 '같은 월', '고정석', '같은 자리'를 신청한 데이터가 있는지 검색합니다.
        const snapshot = await db.collection("applications")
            .where("targetMonth", "==", targetMonthVal)
            .where("type", "==", "고정석")
            .where("seatNum", "==", seatNumVal)
            .get();

        let isDuplicate = false;
        
        snapshot.forEach(doc => {
            // 본인이 예전에 신청했던 내역(currentDocId)을 덮어쓰는 것은 중복이 아닙니다.
            // 본인 문서가 아닌 다른 학생의 문서가 발견되었다면 중복입니다!
            if (doc.id !== currentDocId) {
                isDuplicate = true;
            }
        });

        // 중복이 확인되면 경고창을 띄우고 저장을 즉시 중단합니다.
        if (isDuplicate) {
            alert(`⚠️ 한 발 늦었습니다! [ ${seatNumVal} ] 자리는 방금 다른 학생이 먼저 신청했습니다. 다른 자리를 선택해주세요.`);
            btn.innerText = "신청하기"; // 버튼을 원래대로 되돌림
            btn.disabled = false;     // 버튼을 다시 누를 수 있게 활성화
            return; // ⛔ 여기서 함수를 끝내버려서 파이어베이스에 저장이 안 되게 막습니다.
        }
    }
    // 🌟 [추가 로직 끝]

    // --- 여기서부터는 기존과 동일하게 파이어베이스에 저장하는 과정입니다 ---
    const p = { 
        targetMonth: targetMonthVal, 
        stuId: document.getElementById('stu-id').value, 
        stuName: document.getElementById('stu-name').value, 
        type: typeVal, 
        seatNum: seatNumVal, 
        timestamp: new Date() 
    };

    daysEng.forEach(d => { 
        p[d] = Array.from(document.querySelectorAll(`[id^="${d}-"]:checked`)).map(el => el.value).join(','); 
    });

    try {
        if (currentDocId) {
            await db.collection("applications").doc(currentDocId).update(p); 
        } else {
            await db.collection("applications").add(p);
        }
        alert("성공적으로 신청이 완료되었습니다."); 
        location.reload(); // 성공 시 화면 새로고침
    } catch(e) { 
        // 인터넷 끊김 등 에러 발생 시 처리
        alert("오류가 발생했습니다: " + e.message); 
        btn.innerText = "신청하기"; 
        btn.disabled = false; 
    }
}
</script>
</body>
</html>
