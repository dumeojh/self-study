<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 야간 자율학습 신청</title>
    <style>
        :root {
            --primary: #007bff;
            --fixed-bg: #e3f2fd;
            --fixed-text: #1565c0;
            --flex-bg: #f8f9fa;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .type-btn.active[data-type="1"] { background: var(--fixed-bg); border-color: var(--fixed-text); color: var(--fixed-text); }
        .type-btn.active[data-type="0"] { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .schedule-table th { background: #f8f9fa; padding: 10px; font-size: 13px; border: 1px solid #eee; }
        .schedule-table td { padding: 5px; border: 1px solid #eee; text-align: center; }

        .time-chk {
            display: none;
        }
        .time-label {
            display: block;
            padding: 8px 0;
            border-radius: 5px;
            background: #eee;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }
        .time-chk:checked + .time-label {
            background: var(--primary);
            color: white;
        }

        #submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #submit-btn:disabled { background: #ccc; }

        .info-msg {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>야간 자율학습 신청</h2>
    
    <div class="input-group">
        <label>학번</label>
        <input type="number" id="stu-id" placeholder="예: 20101">
    </div>
    <div class="input-group">
        <label>이름</label>
        <input type="text" id="stu-name" placeholder="실명을 입력하세요">
    </div>

    <label>신청 종류</label>
    <div class="type-selector">
        <button class="type-btn" data-type="1" onclick="selectType(1)">고정석(1)</button>
        <button class="type-btn" data-type="0" onclick="selectType(0)">자율석(0)</button>
    </div>

    <div class="info-msg" id="info-text">
        ※ 고정석은 최소 3일 이상(타임 무관) 선택해야 합니다.
    </div>

    <table class="schedule-table">
        <thead>
            <tr>
                <th>요일</th>
                <th>1타임</th>
                <th>2타임</th>
                <th>3타임</th>
            </tr>
        </thead>
        <tbody id="schedule-body">
            </tbody>
    </table>

    <button id="submit-btn" onclick="submitForm()">신청하기</button>
</div>

<script type="module">
    // 1. 파이어베이스의 기능들을 웹에서 직접 불러옵니다.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🌟 2. 방금 파이어베이스 콘솔에서 복사한 선생님의 firebaseConfig를 여기에 붙여넣으세요!
    const firebaseConfig = {
        apiKey: "여기에_붙여넣으세요",
        authDomain: "여기에_붙여넣으세요",
        projectId: "여기에_붙여넣으세요",
        storageBucket: "여기에_붙여넣으세요",
        messagingSenderId: "여기에_붙여넣으세요",
        appId: "여기에_붙여넣으세요"
    };

    // 3. 파이어베이스 시동 걸기
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 기존 요일 변수와 체크박스 생성 로직 (그대로 유지)
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    const daysEng = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    let selectedType = null;

    const tbody = document.getElementById('schedule-body');
    days.forEach((day, idx) => {
        let row = `<tr>
            <td><strong>${day}</strong></td>
            ${[1, 2, 3].map(t => `
                <td>
                    <input type="checkbox" class="time-chk day-${idx}" id="${daysEng[idx]}-${t}" value="${t}" onchange="window.validateForm()">
                    <label class="time-label" for="${daysEng[idx]}-${t}">${t}T</label>
                </td>
            `).join('')}
        </tr>`;
        tbody.innerHTML += row;
    });

    // 화면 버튼 조작 함수들 (html에서 부를 수 있게 window에 등록)
    window.selectType = function(type) {
        selectedType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.type) === type);
        });
        window.validateForm();
    };

    window.validateForm = function() {
        const id = document.getElementById('stu-id').value;
        const name = document.getElementById('stu-name').value;
        const btn = document.getElementById('submit-btn');
        let selectedDays = 0;
        daysEng.forEach(day => {
            if(document.querySelectorAll(`[id^="${day}-"]:checked`).length > 0) selectedDays++;
        });

        const isIdOk = id.length >= 5;
        const isNameOk = name.length >= 2;
        const isTypeOk = selectedType !== null;
        let isConditionOk = true;

        if (selectedType === 1 && selectedDays < 3) isConditionOk = false;
        btn.disabled = !(isIdOk && isNameOk && isTypeOk && isConditionOk);
    };

    // 🌟 4. 완전히 새로워진 파이어베이스 전송 함수!
    window.submitForm = async function() {
        const idValue = document.getElementById('stu-id').value;
        
        // 보낼 데이터 정리
        const payload = {
            id: idValue,
            name: document.getElementById('stu-name').value,
            type: selectedType,
            dayCount: 0,
            timestamp: new Date().toISOString() // 언제 신청했는지 시간도 저장!
        };

        let totalDays = 0;
        daysEng.forEach(day => {
            const checked = Array.from(document.querySelectorAll(`[id^="${day}-"]:checked`)).map(el => el.value);
            payload[day] = checked.join(',');
            if(checked.length > 0) totalDays++;
        });
        payload.dayCount = totalDays;

        document.getElementById('submit-btn').innerText = "저장 중...";
        document.getElementById('submit-btn').disabled = true;

        try {
            // 🔥 파이어베이스 마법의 한 줄: 'reservations' 폴더에 학번 이름으로 문서를 만들어 덮어씁니다.
            await setDoc(doc(db, "reservations", idValue), payload);
            
            alert("신청이 완벽하게 저장되었습니다!");
            location.reload();
            
        } catch (e) {
            console.error(e);
            alert("저장 실패: " + e.message);
            document.getElementById('submit-btn').innerText = "신청하기";
            document.getElementById('submit-btn').disabled = false;
        }
    };
</script>

</body>
</html>
