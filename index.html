<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 야간 자율학습 신청</title>
    <style>
        :root {
            --primary: #007bff;
            --fixed-bg: #e3f2fd;
            --fixed-text: #1565c0;
            --flex-bg: #f8f9fa;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .type-btn.active[data-type="1"] { background: var(--fixed-bg); border-color: var(--fixed-text); color: var(--fixed-text); }
        .type-btn.active[data-type="0"] { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .schedule-table th { background: #f8f9fa; padding: 10px; font-size: 13px; border: 1px solid #eee; }
        .schedule-table td { padding: 5px; border: 1px solid #eee; text-align: center; }

        .time-chk {
            display: none;
        }
        .time-label {
            display: block;
            padding: 8px 0;
            border-radius: 5px;
            background: #eee;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }
        .time-chk:checked + .time-label {
            background: var(--primary);
            color: white;
        }

        #submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #submit-btn:disabled { background: #ccc; }

        .info-msg {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>야간 자율학습 신청</h2>
    
    <div class="input-group">
        <label>학번</label>
        <input type="number" id="stu-id" placeholder="예: 20101">
    </div>
    <div class="input-group">
        <label>이름</label>
        <input type="text" id="stu-name" placeholder="실명을 입력하세요">
    </div>

    <label>신청 종류</label>
    <div class="type-selector">
        <button class="type-btn" data-type="1" onclick="selectType(1)">고정석(1)</button>
        <button class="type-btn" data-type="0" onclick="selectType(0)">자율석(0)</button>
    </div>

    <div class="info-msg" id="info-text">
        ※ 고정석은 최소 3일 이상(타임 무관) 선택해야 합니다.
    </div>

    <table class="schedule-table">
        <thead>
            <tr>
                <th>요일</th>
                <th>1타임</th>
                <th>2타임</th>
                <th>3타임</th>
            </tr>
        </thead>
        <tbody id="schedule-body">
            </tbody>
    </table>

    <button id="submit-btn" onclick="submitForm()">신청하기</button>
</div>

<script>
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    const daysEng = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    let selectedType = null;

    // 요일별 체크박스 생성
    const tbody = document.getElementById('schedule-body');
    days.forEach((day, idx) => {
        let row = `<tr>
            <td><strong>${day}</strong></td>
            ${[1, 2, 3].map(t => `
                <td>
                    <input type="checkbox" class="time-chk day-${idx}" id="${daysEng[idx]}-${t}" value="${t}" onchange="validateForm()">
                    <label class="time-label" for="${daysEng[idx]}-${t}">${t}T</label>
                </td>
            `).join('')}
        </tr>`;
        tbody.innerHTML += row;
    });

    function selectType(type) {
        selectedType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.type) === type);
        });
        validateForm();
    }

    function validateForm() {
        const id = document.getElementById('stu-id').value;
        const name = document.getElementById('stu-name').value;
        const btn = document.getElementById('submit-btn');
        
        // 선택된 요일 수 계산
        let selectedDays = 0;
        daysEng.forEach(day => {
            if(document.querySelectorAll(`[id^="${day}-"]:checked`).length > 0) selectedDays++;
        });

        const isIdOk = id.length >= 5;
        const isNameOk = name.length >= 2;
        const isTypeOk = selectedType !== null;
        let isConditionOk = true;

        if (selectedType === 1 && selectedDays < 3) isConditionOk = false;

        btn.disabled = !(isIdOk && isNameOk && isTypeOk && isConditionOk);
    }

    // 🌟 핵심 전송 함수
    async function submitForm() {
        // 선생님께서 마지막으로 알려주셨던 구글 앱스 스크립트 주소입니다.
        // 만약 새로 배포하셨다면 이 주소를 꼭 최신 버전으로 교체해 주세요!
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxbv1yu_IbgLdDCbVhIXPzrKD4jHzZXtpTfJMG_POxarTNum2sjNQGiyOZaMbB-8lqJ9A/exec";

        const payload = {
            id: document.getElementById('stu-id').value,
            name: document.getElementById('stu-name').value,
            type: selectedType,
            dayCount: 0
        };

        let totalDays = 0;
        daysEng.forEach(day => {
            const checked = Array.from(document.querySelectorAll(`[id^="${day}-"]:checked`)).map(el => el.value);
            payload[day] = checked.join(',');
            if(checked.length > 0) totalDays++;
        });
        payload.dayCount = totalDays;

        document.getElementById('submit-btn').innerText = "전송 중...";
        document.getElementById('submit-btn').disabled = true;

        try {
            // 헤더를 제거하여 브라우저가 자연스럽게 통신하도록 유도
            const response = await fetch(scriptUrl, {
                method: "POST",
                body: JSON.stringify(payload)
            });

            // 1차 확인: 응답을 JSON이 아닌 Text(글자)로 먼저 받습니다.
            const text = await response.text(); 
            
            try {
                // 정상적인 응답이라면 JSON으로 변환이 성공합니다.
                const res = JSON.parse(text);
                alert(res.message);
                if(res.result === "success") location.reload();
            } catch (jsonError) {
                // 구글이 JSON이 아닌 이상한 페이지(HTML)를 보낸 경우입니다.
                console.error("서버 응답 원본:", text);
                alert("🚨 구글 서버 차단 발생!\n\n학교/교육청 계정의 보안 정책 때문에 외부 전송이 막혔습니다.\n\n해결책: 개인 구글 계정(@gmail.com)으로 구글 시트와 스크립트를 옮겨서 새로 배포한 후, URL을 변경해 주세요!");
            }

        } catch (e) {
            // 통신 자체가 아예 끊긴 경우 (CORS 에러 등)
            alert("🚨 통신 실패!\n원인: " + e.message + "\n\n네트워크 연결 상태나 배포 권한(모든 사용자)을 확인해 주세요.");
        } finally {
            document.getElementById('submit-btn').innerText = "신청하기";
            document.getElementById('submit-btn').disabled = false;
        }
    }
</script>

</body>
</html>
