<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 야간 자율학습 신청</title>
    <style>
        :root {
            --primary: #007bff;
            --fixed-bg: #e3f2fd;
            --fixed-text: #1565c0;
            --flex-bg: #f8f9fa;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .type-btn.active[data-type="1"] { background: var(--fixed-bg); border-color: var(--fixed-text); color: var(--fixed-text); }
        .type-btn.active[data-type="0"] { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .schedule-table th { background: #f8f9fa; padding: 10px; font-size: 13px; border: 1px solid #eee; }
        .schedule-table td { padding: 5px; border: 1px solid #eee; text-align: center; }

        .time-chk {
            display: none;
        }
        .time-label {
            display: block;
            padding: 8px 0;
            border-radius: 5px;
            background: #eee;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }
        .time-chk:checked + .time-label {
            background: var(--primary);
            color: white;
        }

        #submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #submit-btn:disabled { background: #ccc; }

        .info-msg {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>야간 자율학습 신청</h2>
    
    <div class="input-group">
        <label>학번</label>
        <input type="number" id="stu-id" placeholder="예: 20101">
    </div>
    <div class="input-group">
        <label>이름</label>
        <input type="text" id="stu-name" placeholder="실명을 입력하세요">
    </div>

    <label>신청 종류</label>
    <div class="type-selector">
        <button class="type-btn" data-type="1" onclick="selectType(1)">고정석(1)</button>
        <button class="type-btn" data-type="0" onclick="selectType(0)">자율석(0)</button>
    </div>

    <div class="info-msg" id="info-text">
        ※ 고정석은 최소 3일 이상(타임 무관) 선택해야 합니다.
    </div>

    <table class="schedule-table">
        <thead>
            <tr>
                <th>요일</th>
                <th>1타임</th>
                <th>2타임</th>
                <th>3타임</th>
            </tr>
        </thead>
        <tbody id="schedule-body">
            </tbody>
    </table>

    <button id="submit-btn" onclick="submitForm()">신청하기</button>
</div>

<script>
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    const daysEng = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    let selectedType = null;

    // 요일별 체크박스 생성
    const tbody = document.getElementById('schedule-body');
    days.forEach((day, idx) => {
        let row = `<tr>
            <td><strong>${day}</strong></td>
            ${[1, 2, 3].map(t => `
                <td>
                    <input type="checkbox" class="time-chk day-${idx}" id="${daysEng[idx]}-${t}" value="${t}" onchange="validateForm()">
                    <label class="time-label" for="${daysEng[idx]}-${t}">${t}T</label>
                </td>
            `).join('')}
        </tr>`;
        tbody.innerHTML += row;
    });

    function selectType(type) {
        selectedType = type;
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.type) === type);
        });
        validateForm();
    }

    function validateForm() {
        const id = document.getElementById('stu-id').value;
        const name = document.getElementById('stu-name').value;
        const btn = document.getElementById('submit-btn');
        
        // 선택된 요일 수 계산
        let selectedDays = 0;
        daysEng.forEach(day => {
            if(document.querySelectorAll(`[id^="${day}-"]:checked`).length > 0) selectedDays++;
        });

        const isIdOk = id.length >= 5;
        const isNameOk = name.length >= 2;
        const isTypeOk = selectedType !== null;
        let isConditionOk = true;

        if (selectedType === 1 && selectedDays < 3) isConditionOk = false;

        btn.disabled = !(isIdOk && isNameOk && isTypeOk && isConditionOk);
    }

    // 🌟 핵심 전송 함수
   // 🌟 CORS 에러(Failed to fetch)를 우회하는 궁극의 전송 함수!
    function submitForm() {
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzt_N3NfSuH1nx93JaS3HljE-CVbegD87T3DFfQvN5DF0zCatk7CaSrbH0zOy5mxtbOyQ/exec";
        
        // 1. 전송할 데이터 수집
        const payload = {
            id: document.getElementById('stu-id').value,
            name: document.getElementById('stu-name').value,
            type: selectedType,
            dayCount: 0
        };

        let totalDays = 0;
        daysEng.forEach(day => {
            const checked = Array.from(document.querySelectorAll(`[id^="${day}-"]:checked`)).map(el => el.value);
            payload[day] = checked.join(',');
            if(checked.length > 0) totalDays++;
        });
        payload.dayCount = totalDays;

        document.getElementById('submit-btn').innerText = "전송 중...";
        document.getElementById('submit-btn').disabled = true;

        // 2. 투명 망토(보이지 않는 iframe) 만들기
        // 화면이 깜빡이거나 딴 데로 날아가는 걸 막아줍니다.
        let iframe = document.getElementById("hidden-iframe");
        if (!iframe) {
            iframe = document.createElement("iframe");
            iframe.id = "hidden-iframe";
            iframe.name = "hidden-iframe";
            iframe.style.display = "none";
            document.body.appendChild(iframe);
            
            // 데이터 전송이 끝나고 구글이 대답을 보내면 작동하는 부분
            iframe.addEventListener('load', function() {
                // iframe이 로딩되었다는 건 전송이 끝났다는 뜻!
                alert("신청이 완료되었습니다! (구글 시트를 확인해 보세요)");
                location.reload(); // 화면 새로고침
            });
        }

        // 3. 데이터를 담아 보낼 보이지 않는 <form> 만들기
        const form = document.createElement("form");
        form.method = "POST";
        form.action = scriptUrl;
        form.target = "hidden-iframe"; // iframe 몰래 보내기!
        form.style.display = "none";

        // 데이터를 폼 안에 차곡차곡 넣기 (구글 스크립트가 JSON을 기대하므로 통째로 넣습니다)
        // ※ 주의: 구글 스크립트 쪽도 이 폼 전송 방식에 맞춰 한 줄 수정이 필요합니다! (아래 설명 참조)
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = "formData";
        input.value = JSON.stringify(payload);
        form.appendChild(input);

        document.body.appendChild(form);
        form.submit(); // 발사!
    }
</script>

</body>
</html>
