<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야간 자율학습 좌석 신청</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
        }

        #seat-map {
            display: grid;
            gap: 8px; /* 좌석 사이의 간격 */
            max-width: 100%;
            margin: 20px auto;
            /* 가로줄 개수는 자바스크립트에서 자동으로 설정해 줍니다 */
            padding: 15px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 실제 책상 디자인 */
        .seat {
            padding: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background-color: #fff;
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        /* 통로나 빈 공간 (투명하게 처리) */
        .empty-space {
            /* 눈에 보이지 않게 처리합니다 */
            visibility: hidden; 
        }

        /* 선택된 좌석의 디자인 */
        .seat.selected {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
            box-shadow: 0 2px 5px rgba(76, 175, 80, 0.4);
        }

        #submit-btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>학습실 좌석 선택</h2>
    <p>본인의 자리를 터치하세요.</p>

    <div id="seat-map"></div>

    <button id="submit-btn">선택 완료</button>

    <script>
        const seatMap = document.getElementById('seat-map');
        const submitBtn = document.getElementById('submit-btn');
        let selectedSeatNumber = null;

        // 🌟 핵심 포인트: 0과 1로 학습실 지도를 그립니다. 🌟
        // 1 = 책상, 0 = 통로/빈공간
        const roomLayout = [
            [1, 1, 0, 1, 1, 0, 1, 1], // 첫 번째 줄 (2자리, 통로, 2자리, 통로, 2자리)
            [1, 1, 0, 1, 1, 0, 1, 1], // 두 번째 줄
            [1, 1, 0, 1, 1, 0, 1, 1], // 세 번째 줄
            [0, 0, 0, 0, 0, 0, 0, 0], // 가로 통로 (전부 0)
            [1, 1, 0, 1, 1, 0, 1, 1], // 네 번째 줄
            [1, 1, 0, 1, 1, 0, 1, 1]  // 다섯 번째 줄
        ];

        // 지도의 가로 칸 수를 계산해서 CSS 그리드에 적용합니다.
        const cols = roomLayout[0].length;
        seatMap.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        let seatCounter = 1; // 좌석 번호를 1번부터 매기기 위한 변수

        // 지도를 한 줄씩 읽어오면서 화면에 그립니다.
        roomLayout.forEach(row => {
            row.forEach(cell => {
                const div = document.createElement('div');

                if (cell === 1) {
                    // 책상(1)인 경우
                    div.classList.add('seat');
                    div.innerText = seatCounter; // 번호 부여
                    div.dataset.seatId = seatCounter;

                    // 클릭 이벤트 추가
                    div.addEventListener('click', function() {
                        const previouslySelected = document.querySelector('.seat.selected');
                        if (previouslySelected) {
                            previouslySelected.classList.remove('selected');
                        }
                        div.classList.add('selected');
                        selectedSeatNumber = div.dataset.seatId;
                    });

                    seatCounter++; // 다음 책상 번호를 위해 1 증가
                } else {
                    // 빈 공간(0)인 경우
                    div.classList.add('empty-space');
                }

                seatMap.appendChild(div);
            });
        });

        submitBtn.addEventListener('click', function() {
            if (selectedSeatNumber === null) {
                alert("먼저 좌석을 선택해주세요!");
            } else {
                alert(selectedSeatNumber + "번 좌석을 선택하셨습니다.");
            }
        });
    </script>

</body>
</html>
