<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 자율학습 통합 관리자</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1250px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin: 0; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tab-menu { display: flex; gap: 5px; margin-bottom: 25px; background: #eee; padding: 5px; border-radius: 10px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; min-width: 120px; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-primary { background: var(--primary); }
        .btn-gray { background: var(--gray); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px 8px; text-align: center; }
        th { background: #f8f9fa; }
        tbody tr:hover { background-color: #f1f8ff; }

        /* 좌석 격자 */
        .seat-grid { display: grid; gap: 4px; justify-content: start; overflow-x: auto; padding: 10px; background: #eee; border-radius: 10px; }
        .seat-cell { width: 55px; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-radius: 5px; border: 1px solid #ccc; transition: 0.2s; text-align: center; line-height: 1.2; background: white; }
/* 좌석 격자 기본 설정 */
.seat-0 { background: transparent; border: none; }
.seat-1 { background: white; } /* 변경: 고정석 기본 바탕 흰색 */
.seat-2 { background: white; } /* 변경: 자율석 기본 바탕 흰색 */
.seat-3 { background: #e2e3e5; color: #41464b; }
.seat-4 { background: #cff4fc; color: #055160; }
.seat-5 { background: #f8d7da; color: #842029; }

/* 🌟 상태별 디자인 클래스 명확화 */
/* 미입실(결석): 연한 빨간색 바탕 + 빨간색 점선 테두리 */
.status-absent { background: #fff0f0 !important; border: 2px dashed #dc3545 !important; color: #dc3545 !important; }

/* 입실 완료(고정석): 연한 노란색 바탕 + 노란 실선 테두리 */
.status-present-fixed { background: #fff3cd !important; border: 2px solid #ffc107 !important; color: #856404 !important; }

/* 입실 완료(자율석): 연한 초록색 바탕 + 초록 실선 테두리 */
.status-present-auto { background: #d1e7dd !important; border: 2px solid #2e7d32 !important; color: #0f5132 !important; }

        /* 상담 리포트 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 95%; max-width: 650px; overflow-y: auto; max-height: 90vh; }
        .counsel-calendar { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
        .counsel-calendar th, .counsel-calendar td { border: 1px solid #eee; padding: 5px; text-align: center; }
        .counsel-calendar td { height: 80px; vertical-align: top; font-size: 12px; }
        .day-box { font-weight: bold; margin-bottom: 5px; }
        .time-slot-container { display: flex; flex-direction: column; gap: 2px; }
        .time-slot { font-size: 9px; padding: 1px 0; border-radius: 3px; border: 1px solid #f0f0f0; color: #ccc; text-align: center; }
        .slot-applied { border: 1px solid var(--primary); color: var(--primary); }
        .slot-present { background: var(--primary); color: white !important; }
        .slot-absent { background: #fff0f0; color: var(--danger) !important; border-color: var(--danger); }

        /* 입력 폼 (한 줄 배치 최적화) */
        .form-card { background:#f8f9fa; padding:25px; border-radius:10px; border:1px solid #ddd; }
        .input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .input-group-item { flex: 1; min-width: 130px; }
        .input-group-item label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        .input-group-item input, .input-group-item select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; height: 42px; }
        .time-input-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .time-item { flex: 1; min-width: 50px; text-align: center; background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }

        /* 월화수목금토일 font-size: 16px; 로 수정 */
        .time-item label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 16px; }
        .time-item input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 16px; font-weight: bold; }
/* 태그 누락자 표시: 눈에 띄는 주황색 계열 */
.status-missing-tag { 
    background: #fff3cd !important; 
    border: 3px solid #fd7e14 !important; 
    color: #fd7e14 !important; 
    text-decoration: underline;
}

        
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2 style="flex-grow: 1;">안성여고 야간 자율학습 통합 관리</h2>
        <button class="btn btn-primary" style="background:#dc3545;" onclick="closeMissingTags()">
    🚨 일일 출결 강제 마감 (태그 누락자 색출)
</button>
        <button class="btn btn-gray" onclick="location.href='settings.html'">⚙️ 환경설정</button>
    </div>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab-daily', this)">🧑‍🏫 오늘 감독용 좌석표</button>
        <button class="tab-btn" onclick="switchTab('tab-status', this)">📊 월별 신청 현황</button>
        <button class="tab-btn" onclick="switchTab('tab-manual', this)">📝 개별 수정/추가</button>
        <button class="tab-btn" onclick="switchTab('tab-stats', this)">📈 통계 분석</button>
    </div>

    <div id="tab-daily" class="tab-content active">
        <div style="text-align:center; background:#e3f2fd; padding:15px; border-radius:10px; margin-bottom:15px;">
            날짜: <input type="date" id="daily-date" onchange="loadDailyDataAndRender()">
            교시: <select id="daily-time" onchange="renderDailySupervisorMap()">
                <option value="1">1타임</option><option value="2">2타임</option><option value="3">3타임</option>
            </select>
        </div>
        <div id="supervisor-grid" class="seat-grid"></div>
    </div>

    <div id="tab-status" class="tab-content">
        <select id="filter-month" onchange="renderStatusTable()" style="padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ddd;">
            <option value="all">전체보기</option>
            <option value="3월">3월</option><option value="4월" selected>4월</option><option value="5월">5월</option>
        </select>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>월</th><th>학번</th><th>이름</th><th>종류</th><th>좌석</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th></tr></thead>
                <tbody id="status-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-manual" class="tab-content">
        <div class="form-card">
            <h3>✍️ 학생 데이터 개별 수정 / 추가</h3>
            <input type="hidden" id="edit-doc-id">
            <div class="input-row">
                <div class="input-group-item">
                    <label>적용 월</label>
                    <select id="m-month">
                        <option value="1월">1월</option><option value="2월">2월</option><option value="3월">3월</option>
                        <option value="4월">4월</option><option value="5월">5월</option><option value="6월">6월</option>
                        <option value="7월">7월</option><option value="8월">8월</option><option value="9월">9월</option>
                        <option value="10월">10월</option><option value="11월">11월</option><option value="12월">12월</option>
                    </select>
                </div>
                <div class="input-group-item"><label>학번</label><input type="number" id="m-id" placeholder="학번"></div>
                <div class="input-group-item"><label>이름</label><input type="text" id="m-name" placeholder="이름"></div>
                <div class="input-group-item">
                    <label>좌석 종류</label>
                    <select id="m-type"><option value="고정석">고정석</option><option value="자율석">자율석</option></select>
                </div>
                <div class="input-group-item"><label>좌석 번호</label><input type="text" id="m-seatNum" placeholder="예: A-1"></div>
            </div>
            <div class="time-input-row">
                <div class="time-item"><label>월</label><input type="text" id="m-mon"></div>
                <div class="time-item"><label>화</label><input type="text" id="m-tue"></div>
                <div class="time-item"><label>수</label><input type="text" id="m-wed"></div>
                <div class="time-item"><label>목</label><input type="text" id="m-thu"></div>
                <div class="time-item"><label>금</label><input type="text" id="m-fri"></div>
                <div class="time-item" style="background:#e7f1ff;"><label style="color:blue;">토</label><input type="text" id="m-sat"></div>
                <div class="time-item" style="background:#fff5f5;"><label style="color:red;">일</label><input type="text" id="m-sun"></div>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:20px; height:50px; font-size:16px;" onclick="saveManualEntry()">💾 데이터 저장하기</button>
        </div>
    </div>

    <div id="tab-stats" class="tab-content">
        <div class="form-card">
            <h3>📊 전체 신청 통계 현황</h3>
            <div id="stats-container">데이터를 분석 중입니다...</div>
        </div>
    </div>
</div>

<div id="counsel-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--primary); padding-bottom:10px;">
            <h3 id="counsel-title" style="margin:0;">🧑‍🎓 상담 리포트</h3>
            <button class="btn btn-gray" onclick="document.getElementById('counsel-modal').style.display='none'">닫기</button>
        </div>
        <div id="counsel-calendar-area"></div>
        <div style="background:#f8f9fa; padding:15px; border-radius:10px; margin-top:15px; display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; font-size:13px; text-align:center;">
            <div>신청 타임<br><b id="c-total-apply" style="color:var(--primary); font-size:16px;">0</b>회</div>
            <div>출석 타임<br><b id="c-total-present" style="color:var(--success); font-size:16px;">0</b>회</div>
            <div>참여율<br><b id="c-rate" style="color:var(--danger); font-size:16px;">0</b>%</div>
            <div>학습 시간<br><b id="c-total-min" style="color:#333; font-size:16px;">0</b>분</div>
        </div>
        <div id="c-comment" style="margin-top:15px; padding:10px; background:#eef6ff; border-radius:8px; font-size:13px;"></div>
    </div>
</div>

<script>
    // --- [기존 변수 선언부 아래에 추가] ---
let dailyReservationsData = []; // 당일 자율석 발권 데이터 저장용
    
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let applicationData = {}; let attendanceLogsData = {}; let seatMapData = []; let rows = 20, cols = 30;

    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });
    document.getElementById('daily-date').value = todayStr;

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active'); 
        if(btn) btn.classList.add('active');
        if(tabId === 'tab-status') renderStatusTable();
        if(tabId === 'tab-stats') renderSimpleStats();
    }

    // --- [지도 및 출결 로직] ---
    async function loadSeatLayout() {
        const doc = await db.collection("settings").doc("seatLayout").get();
        if (doc.exists) {
            rows = doc.data().rows; cols = doc.data().cols;
            seatMapData = JSON.parse(doc.data().grid);
            renderDailySupervisorMap();
        }
    }

// --- [데이터 로드 함수 수정] ---
function loadDailyDataAndRender() {
    const dateStr = document.getElementById('daily-date').value;
    
    // 1. 출결 로그 감시 (기존 코드)
    db.collection("attendance_logs").where("date", "==", dateStr).onSnapshot(snap => {
        attendanceLogsData = {}; 
        snap.forEach(doc => attendanceLogsData[String(doc.data().stuId)] = doc.data());
        renderDailySupervisorMap();
    });

    // 2. 🌟 [추가] 당일 자율석 예약 내역 감시
    db.collection("daily_reservations").where("date", "==", dateStr).onSnapshot(snap => {
        dailyReservationsData = [];
        snap.forEach(doc => dailyReservationsData.push(doc.data()));
        renderDailySupervisorMap();
    });
}

// --- [지도 렌더링 함수 수정] ---
function renderDailySupervisorMap() {
    if(seatMapData.length === 0) return;
    const container = document.getElementById('supervisor-grid');
    container.innerHTML = ''; 
    container.style.gridTemplateColumns = `repeat(${cols}, 55px)`;
    
    const timeStr = document.getElementById('daily-time').value; // 현재 선택된 교시 (1, 2, 3)
    const targetDay = ['sun','mon','tue','wed','thu','fri','sat'][new Date(document.getElementById('daily-date').value).getDay()];
    
    const cellEls = {};

    // 1. 기본 도면 그리기
    seatMapData.forEach((rowCells) => {
        rowCells.forEach((d) => {
            const cell = typeof d === 'number' ? {type: d, label: ""} : d;
            const div = document.createElement('div');
            div.className = `seat-cell seat-${cell.type}`; 
            div.innerText = cell.label || "";
            // 좌석 라벨이 있는 경우 매핑용 객체에 저장
            if ((cell.type === 1 || cell.type === 2) && cell.label) cellEls[cell.label] = div;
            container.appendChild(div);
        });
    });

    // 2. 고정석 학생 배치 
    // 🌟 수정: Object.entries를 사용하여 클릭 이벤트에 필요한 docId를 가져옵니다.
    Object.entries(applicationData).forEach(([docId, d]) => {
        if(d.type === "고정석" && d[targetDay] && d[targetDay].includes(timeStr) && cellEls[d.seatNum]) {
            const target = cellEls[d.seatNum]; 
            const log = attendanceLogsData[String(d.stuId)];
            target.innerHTML = `${d.seatNum}<br><span style="font-size:10px; color:#1565c0;">${d.stuName}</span>`;
            
if (log) {
    if (log.status === "귀가(누락)") {
        target.classList.add('status-missing-tag'); // 태그 누락자 전용 디자인
    } else if (log.status !== "귀가") {
        target.classList.add('status-present-fixed'); // 정상 입실
    } else {
        target.classList.add('status-absent'); // 정상 귀가 완료
    }
} else {
    target.classList.add('status-absent'); // 기록 없음(결석)
}


            
            // 🌟 [복구됨] 클릭 시 상담 리포트 팝업 연결
            target.style.cursor = "pointer";
            target.onclick = () => openCounsel(docId);
        }
    });

// 3. 자율석 발권 학생 배치
dailyReservationsData.forEach(d => {
    // 해당 학생이 발권한 타임에 현재 교시가 포함되어 있는지 확인
    if(d.times && d.times.includes(timeStr) && cellEls[d.seatNum]) {
        const target = cellEls[d.seatNum];
        const log = attendanceLogsData[String(d.stuId)];
        
        target.innerHTML = `${d.seatNum}<br><span style="font-size:10px; color:#2e7d32;">${d.stuName}</span>`;

        // (기존에 있던 target.style.backgroundColor 등 강제 색상 지정 코드 삭제)

        // 출결 상태에 따라 미리 만들어둔 CSS 클래스만 부여하여 디자인 적용
        if(log && log.status !== "귀가") {
            // 입실 완료: 자율석 전용 초록색 테마 적용
            target.classList.add('status-present-auto'); 
        } else {
            // 미입실: 연한 빨간색 + 점선 테마 적용
            target.classList.add('status-absent'); 
        }

        const appEntry = Object.entries(applicationData).find(([id, app]) => String(app.stuId) === String(d.stuId));
        if (appEntry) {
            target.style.cursor = "pointer";
            target.onclick = () => openCounsel(appEntry[0]);
        }
    }
});
}


    
    // --- [상담 리포트] ---
    async function openCounsel(docId) {
        const student = applicationData[docId]; if(!student) return;
        document.getElementById('counsel-modal').style.display = 'flex';
        document.getElementById('counsel-title').innerText = `${student.stuId} ${student.stuName} 상담 리포트`;

        const monthMap = { "1월":0,"2월":1,"3월":2,"4월":3,"5월":4,"6월":5,"7월":6,"8월":7,"9월":8,"10월":9,"11월":10,"12월":11 };
        const mIdx = monthMap[student.targetMonth];
        const year = 2026;

        const logsSnap = await db.collection("attendance_logs").where("stuId", "==", String(student.stuId)).get();
        let logs = {}; logsSnap.forEach(doc => logs[doc.data().date] = doc.data());

        const firstDay = new Date(year, mIdx, 1).getDay();
        const lastDate = new Date(year, mIdx + 1, 0).getDate();
        let html = `<table class="counsel-calendar"><thead><tr><th style="color:red">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th style="color:blue">토</th></tr></thead><tbody><tr>`;
        
        let tApply = 0, tPresent = 0;
        for(let i=0; i<firstDay; i++) html += `<td></td>`;
        for(let d=1; d<=lastDate; d++) {
            const dStr = `${year}-${String(mIdx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayKey = ['sun','mon','tue','wed','thu','fri','sat'][new Date(year, mIdx, d).getDay()];
            const appliedTimes = (student[dayKey] || "").split(',').filter(v => v);
            const history = logs[dStr] ? logs[dStr].history.join(',') : "";
            let slotHtml = `<div class="time-slot-container">`;
            [1, 2, 3].forEach(t => {
                const isApplied = appliedTimes.includes(String(t));
                const isPresent = history.includes(`${t}타임 입실`);
                let cls = "time-slot";
                if(isApplied) { tApply++; cls += " slot-applied"; if(isPresent) { cls += " slot-present"; tPresent++; } else { cls += " slot-absent"; } }
                slotHtml += `<div class="${cls}">${t}T</div>`;
            });
            slotHtml += `</div>`;
            html += `<td><div class="day-box">${d}</div>${slotHtml}</td>`;
            if((firstDay+d)%7===0) html += `</tr><tr>`;
        }
        document.getElementById('counsel-calendar-area').innerHTML = html + `</tr></tbody></table>`;
        const rate = tApply > 0 ? Math.round((tPresent / tApply) * 100) : 0;
        document.getElementById('c-total-apply').innerText = tApply;
        document.getElementById('c-total-present').innerText = tPresent;
        document.getElementById('c-rate').innerText = rate + "%";
        document.getElementById('c-total-min').innerText = tPresent * 80;
        document.getElementById('c-comment').innerText = rate >= 80 ? "✨ 매우 성실한 학생입니다." : "⚠️ 정기적인 참여가 필요합니다.";
    }

    // --- [데이터 관리] ---
    function renderStatusTable() {
        const tbody = document.getElementById('status-body'); tbody.innerHTML = "";
        const month = document.getElementById('filter-month').value;
        Object.keys(applicationData).map(id => ({ docId: id, ...applicationData[id] })).sort((a,b)=>a.stuId-b.stuId).forEach(d => {
            if(month !== "all" && d.targetMonth !== month) return;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${d.targetMonth}</td><td onclick="fillEditForm('${d.docId}')" style="cursor:pointer; color:var(--primary);">${d.stuId}</td><td onclick="openCounsel('${d.docId}')" style="cursor:pointer; font-weight:bold;">${d.stuName}</td><td>${d.type}</td><td>${d.seatNum||'-'}</td><td>${d.mon||''}</td><td>${d.tue||''}</td><td>${d.wed||''}</td><td>${d.thu||''}</td><td>${d.fri||''}</td><td>${d.sat||''}</td><td>${d.sun||''}</td>`;
            tbody.appendChild(tr);
        });
    }

    function fillEditForm(id) {
        const d = applicationData[id]; document.getElementById('edit-doc-id').value = id;
        document.getElementById('m-month').value = d.targetMonth; document.getElementById('m-id').value = d.stuId; document.getElementById('m-name').value = d.stuName;
        document.getElementById('m-type').value = d.type || "고정석"; document.getElementById('m-seatNum').value = d.seatNum||"";
        ['mon','tue','wed','thu','fri','sat','sun'].forEach(k => document.getElementById(`m-${k}`).value = d[k]||"");
        switchTab('tab-manual', document.querySelectorAll('.tab-btn')[2]);
    }

    async function saveManualEntry() {
        const id = document.getElementById('edit-doc-id').value;
        const data = { 
            targetMonth: document.getElementById('m-month').value, 
            stuId: String(document.getElementById('m-id').value), 
            stuName: document.getElementById('m-name').value, 
            type: document.getElementById('m-type').value, 
            seatNum: document.getElementById('m-seatNum').value, 
            mon: document.getElementById('m-mon').value || "", 
            tue: document.getElementById('m-tue').value || "", 
            wed: document.getElementById('m-wed').value || "", 
            thu: document.getElementById('m-thu').value || "", 
            fri: document.getElementById('m-fri').value || "", 
            sat: document.getElementById('m-sat').value || "", 
            sun: document.getElementById('m-sun').value || "",
            lastUpdateTime: new Date()
        };
        try {
            if(id) await db.collection("applications").doc(id).update(data); else await db.collection("applications").add(data);
            alert("저장되었습니다."); resetManualForm(); switchTab('tab-status', document.querySelectorAll('.tab-btn')[1]);
        } catch(e) { alert("오류: " + e.message); }
    }

// 일일 출결 마감 (태그 누락자 강제 처리)
async function closeMissingTags() {
    const targetDate = document.getElementById('daily-date').value; // 현재 보고 있는 날짜
    
    if (!confirm(`${targetDate} 일자의 출결을 마감하시겠습니까?\n아직 귀가하지 않은 학생은 '태그 누락'으로 처리됩니다.`)) {
        return;
    }

    try {
        // 1. 해당 날짜의 출결 로그 몽땅 가져오기
        const snapshot = await db.collection("attendance_logs").where("date", "==", targetDate).get();
        
        let missingCount = 0;
        const now = new Date();

        // 2. 환경설정에서 야자 공식 종료 시간 가져오기 (예: 21:30)
        const schedDoc = await db.collection("settings").doc("schedule").get();
        const endTimeStr = schedDoc.exists ? (schedDoc.data().t3_end || "21:30") : "21:30";

        // 데이터베이스 업데이트를 한 번에 처리하기 위한 Batch 준비
        const batch = db.batch();

        snapshot.forEach(doc => {
            const data = doc.data();
            
            // 3. 상태가 '귀가'가 아니면 태그 누락으로 간주 ('입실', '복귀', '외출' 상태로 방치된 경우)
            if (data.status !== "귀가" && data.status !== "귀가(누락)") {
                missingCount++;
                const docRef = db.collection("attendance_logs").doc(doc.id);
                
                // 4. 어떻게 기록할지 정의
                // (선택 사항) 태그를 안 찍고 갔으므로, 시스템 공식 종료 시간을 기준으로 강제 계산하거나 0분 처리할 수 있습니다. 
                // 여기서는 '태그 누락'이라는 명확한 꼬리표를 달아줍니다.
                const updateData = {
                    status: "귀가(누락)", // 상태를 누락으로 변경
                    lastUpdateTime: now,
                    // 히스토리에 빨간색 글씨로 누락 사실을 기록
                    history: firebase.firestore.FieldValue.arrayUnion(`🚨 태그 누락 강제 마감`) 
                };
                
                batch.update(docRef, updateData);
            }
        });

        // 5. 변경된 내역을 DB에 일괄 반영
        if (missingCount > 0) {
            await batch.commit();
            alert(`총 ${missingCount}명의 태그 누락자를 강제 마감 처리했습니다.`);
            loadDailyDataAndRender(); // 화면 새로고침
        } else {
            alert("태그 누락자가 없습니다. 완벽한 하루네요!");
        }

    } catch (e) {
        console.error("마감 처리 중 오류:", e);
        alert("오류가 발생했습니다: " + e.message);
    }
}

    
    function resetManualForm() { document.getElementById('edit-doc-id').value = ""; document.querySelectorAll('#tab-manual input').forEach(i => i.value = ""); }
    function renderSimpleStats() { document.getElementById('stats-container').innerHTML = `<p>총 신청 인원: <b>${Object.keys(applicationData).length}명</b></p>`; }

    db.collection("applications").onSnapshot(snap => {
        applicationData = {}; snap.forEach(doc => applicationData[doc.id] = doc.data());
        renderStatusTable(); renderDailySupervisorMap();
    });

    loadSeatLayout(); loadDailyDataAndRender();
</script>
