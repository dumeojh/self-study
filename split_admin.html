<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 자율학습 통합 관리자</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h2 { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin: 0; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 탭 메뉴 */
        .tab-menu { display: flex; gap: 5px; margin-bottom: 25px; background: #eee; padding: 5px; border-radius: 10px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; min-width: 120px; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-primary { background: var(--primary); }
        .btn-gray { background: var(--gray); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px 8px; text-align: center; }
        th { background: #f8f9fa; }
        tbody tr:hover { background-color: #f1f8ff; }

        /* 좌석 격자 스타일 */
        .seat-grid { display: grid; gap: 4px; justify-content: start; }
        .seat-cell { width: 55px; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-radius: 5px; border: 1px solid #ccc; transition: 0.2s; text-align: center; line-height: 1.2; }
        .seat-0 { background: #fff; border: 1px solid #eee; }
        .seat-3 { background: #e2e3e5; color: #41464b; }
        .seat-4 { background: #cff4fc; color: #055160; }
        .seat-5 { background: #f8d7da; color: #842029; }
        .status-absent { border: 2px dashed #adb5bd !important; color: #6c757d; }
        .status-present-fixed { background: #fff3cd !important; border: 2px solid #ffc107 !important; color: #856404 !important; }

        /* 통계 카드 */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card .value { font-size: 24px; font-weight: bold; color: var(--primary); margin-top: 10px; }

        /* 상담용 달력 스타일 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 600px; overflow-y: auto; max-height: 90vh; }
        .counsel-calendar { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
        .counsel-calendar th, .counsel-calendar td { border: 1px solid #eee; padding: 5px; text-align: center; width: 14.2%; }
        .counsel-calendar td { height: 75px; vertical-align: top; }
        
        .day-box { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .time-slot-container { display: flex; flex-direction: column; gap: 2px; }
        .time-slot { font-size: 9px; padding: 1px 0; border-radius: 3px; border: 1px solid #f0f0f0; color: #ccc; }
        .slot-applied { border: 1px solid var(--primary); color: var(--primary); }
        .slot-present { background: var(--primary); color: white !important; }
        .slot-absent { background: #fff0f0; color: var(--danger) !important; border-color: var(--danger); }

        .form-card { background:#f8f9fa; padding:25px; border-radius:10px; border:1px solid #ddd; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2 style="flex-grow: 1;">안성여고 야간 자율학습 통합 관리</h2>
        <button class="btn" style="background:#6c757d;" onclick="location.href='settings.html'">⚙️ 환경설정</button>
    </div>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab-daily', this)">🧑‍🏫 오늘 감독용 좌석표</button>
        <button class="tab-btn" onclick="switchTab('tab-status', this)">📊 월별 신청 현황</button>
        <button class="tab-btn" onclick="switchTab('tab-manual', this)">📝 개별 수정/추가</button>
        <button class="tab-btn" onclick="switchTab('tab-stats', this)">📈 통계 분석</button>
    </div>

    <div id="tab-daily" class="tab-content active">
        <div style="text-align:center; background:#e3f2fd; padding:15px; border-radius:10px; margin-bottom:15px;">
            날짜: <input type="date" id="daily-date" onchange="loadDailyDataAndRender()">
            교시: <select id="daily-time" onchange="renderDailySupervisorMap()">
                <option value="1">1타임</option><option value="2">2타임</option><option value="3">3타임</option>
            </select>
            <button class="btn btn-primary" onclick="loadDailyDataAndRender()">데이터 동기화</button>
        </div>
        <div style="overflow-x:auto; background:white; padding:15px; border-radius:10px; border:1px solid #ddd;">
            <div id="supervisor-grid" class="seat-grid"></div>
        </div>
    </div>

    <div id="tab-status" class="tab-content">
        <div style="margin-bottom:10px; display: flex; justify-content: space-between;">
            <select id="filter-month" onchange="renderStatusTable()" style="padding:8px; border-radius:5px;">
                <option value="all">전체보기</option>
                <option value="3월">3월</option><option value="4월" selected>4월</option>
                <option value="5월">5월</option><option value="6월">6월</option>
            </select>
            <span style="font-size: 12px; color: #666;">* 이름: 상담 리포트 / 학번: 데이터 수정</span>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>월</th><th>학번</th><th>이름</th><th>종류</th><th>좌석</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead>
                <tbody id="status-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-manual" class="tab-content">
        <div class="form-card">
            <h3>✍️ 학생 데이터 개별 수정</h3>
            <input type="hidden" id="edit-doc-id">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
                <div class="input-group"><label>적용 월</label><input type="text" id="m-month"></div>
                <div class="input-group"><label>학번</label><input type="number" id="m-id"></div>
                <div class="input-group"><label>이름</label><input type="text" id="m-name"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div class="input-group"><label>좌석 종류</label><input type="text" id="m-type"></div>
                <div class="input-group"><label>좌석 번호</label><input type="text" id="m-seatNum"></div>
            </div>
            <div class="input-group">
                <label>요일별 타임 (예: 1,2)</label>
                <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
                    <div>월 <input type="text" id="m-mon"></div><div>화 <input type="text" id="m-tue"></div><div>수 <input type="text" id="m-wed"></div><div>목 <input type="text" id="m-thu"></div><div>금 <input type="text" id="m-fri"></div>
                </div>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-primary" style="flex: 2;" onclick="saveManualEntry()">💾 변경사항 저장</button>
                <button class="btn btn-gray" style="flex: 1;" onclick="resetManualForm()">🔄 입력창 비우기</button>
            </div>
        </div>
    </div>

    <div id="tab-stats" class="tab-content">
        <div class="form-card">
            <h3>📊 전체 참여 통계 분석</h3>
            <div class="stat-grid">
                <div class="stat-card"><h4>총 신청 인원</h4><div id="stat-total" class="value">0명</div></div>
                <div class="stat-card"><h4>최다 신청 요일</h4><div id="stat-peak-day" class="value">-</div></div>
                <div class="stat-card"><h4>학년별 1위</h4><div id="stat-peak-grade" class="value">-</div></div>
                <div class="stat-card"><h4>전체 평균 참여율</h4><div id="stat-avg-rate" class="value">0%</div></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="stat-card" style="text-align:left;"><h4>🏫 학년별 분포</h4><div id="grade-list"></div></div>
                <div class="stat-card" style="text-align:left;"><h4>📅 요일별 수요</h4><div id="day-list"></div></div>
            </div>
        </div>
    </div>
</div>

<div id="counsel-modal" class="modal-overlay">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom:10px; margin-bottom:15px;">
            <h3 id="counsel-title" style="margin:0;">🧑‍🎓 교시별 상담 리포트</h3>
            <button class="btn btn-gray" style="padding:5px 10px;" onclick="document.getElementById('counsel-modal').style.display='none'">닫기</button>
        </div>
        <div id="counsel-calendar-area"></div>
        <div style="background:#f8f9fa; padding:15px; border-radius:10px; margin-top:15px; display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; font-size:13px;">
            <div style="text-align:center;">신청 타임<br><b id="c-total-apply" style="color:var(--primary); font-size:18px;">0</b>회</div>
            <div style="text-align:center;">출석 타임<br><b id="c-total-present" style="color:var(--success); font-size:18px;">0</b>회</div>
            <div style="text-align:center;">최종 참여율<br><b id="c-rate" style="color:var(--danger); font-size:18px;">0</b>%</div>
        </div>
        <div id="c-comment" style="margin-top:15px; padding:10px; background:#eef6ff; border-radius:8px; font-size:13px; color:#333; line-height:1.5;"></div>
    </div>
</div>

<script>
    // --- 파이어베이스 설정 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let applicationData = {}; let attendanceLogsData = {}; let seatMapData = []; let rows = 20, cols = 30;

    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });
    document.getElementById('daily-date').value = todayStr;

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active'); 
        if(btn) btn.classList.add('active');
        if(tabId === 'tab-status') renderStatusTable();
        if(tabId === 'tab-stats') calculateGeneralStats();
    }

    // --- 통계 및 상담 로직 ---
    function calculateGeneralStats() {
        const apps = Object.values(applicationData);
        document.getElementById('stat-total').innerText = apps.length + "명";
        let days = {'월':0, '화':0, '수':0, '목':0, '금':0};
        let grades = {'1학년':0, '2학년':0, '3학년':0};
        apps.forEach(a => {
            if(a.mon) days['월']++; if(a.tue) days['화']++; if(a.wed) days['수']++; if(a.thu) days['목']++; if(a.fri) days['금']++;
            const g = String(a.stuId)[0]; if(g==='1') grades['1학년']++; else if(g==='2') grades['2학년']++; else if(g==='3') grades['3학년']++;
        });
        document.getElementById('day-list').innerHTML = Object.entries(days).map(([d,v])=>`<p>${d}요일: <b>${v}명</b></p>`).join('');
        document.getElementById('grade-list').innerHTML = Object.entries(grades).map(([g,v])=>`<p>${g}: <b>${v}명</b></p>`).join('');
    }

    async function openCounsel(docId) {
        const student = applicationData[docId];
        if(!student) return;
        document.getElementById('counsel-title').innerText = `${student.stuId} ${student.stuName} 상담 리포트`;
        document.getElementById('counsel-modal').style.display = 'flex';

        const monthMap = { "3월": 2, "4월": 3, "5월": 4, "6월": 5 };
        const mIdx = monthMap[student.targetMonth] || 3;
        const year = 2026;

        const logsSnap = await db.collection("attendance_logs").where("stuId", "==", String(student.stuId)).get();
        let logs = {};
        logsSnap.forEach(doc => { if(doc.data().date.includes(`-0${mIdx+1}-`)) logs[doc.data().date] = doc.data(); });

        const firstDay = new Date(year, mIdx, 1).getDay();
        const lastDate = new Date(year, mIdx + 1, 0).getDate();
        let html = `<table class="counsel-calendar"><thead><tr><th style="color:red">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th style="color:blue">토</th></tr></thead><tbody><tr>`;
        
        let tApply = 0, tPresent = 0;
        for(let i=0; i<firstDay; i++) html += `<td></td>`;
        for(let d=1; d<=lastDate; d++) {
            const dStr = `${year}-${String(mIdx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayKey = ['sun','mon','tue','wed','thu','fri','sat'][new Date(year, mIdx, d).getDay()];
            const appliedTimes = (student[dayKey] || "").split(',').filter(v => v);
            const history = logs[dStr] ? logs[dStr].history.join(',') : "";

            let slotHtml = `<div class="time-slot-container">`;
            [1, 2, 3].forEach(t => {
                const isApplied = appliedTimes.includes(String(t));
                const isPresent = history.includes(`${t}타임 입실`);
                let cls = "time-slot";
                if(isApplied) { tApply++; cls += " slot-applied"; if(isPresent) { cls += " slot-present"; tPresent++; } else { cls += " slot-absent"; } }
                slotHtml += `<div class="${cls}">${t}T</div>`;
            });
            slotHtml += `</div>`;
            html += `<td><div class="day-box">${d}</div>${slotHtml}</td>`;
            if((firstDay+d)%7===0) html += `</tr><tr>`;
        }
        document.getElementById('counsel-calendar-area').innerHTML = html + `</tr></tbody></table>`;
        const rate = tApply > 0 ? Math.round((tPresent / tApply) * 100) : 0;
        document.getElementById('c-total-apply').innerText = tApply;
        document.getElementById('c-total-present').innerText = tPresent;
        document.getElementById('c-rate').innerText = rate;
        document.getElementById('c-total-time').innerText = tPresent * 80;
        document.getElementById('c-comment').innerText = rate >= 80 ? "✨ 본인이 신청한 학습 시간을 아주 잘 지키고 있습니다." : "⚠️ 신청한 교시에 비해 실제 참여가 부족한 경우가 있습니다. 사유를 확인해 볼 필요가 있습니다.";
    }

    // --- 기본 기능 유지 ---
    async function loadSeatLayout() {
        const doc = await db.collection("settings").doc("seatLayout").get();
        if (doc.exists) {
            const data = doc.data(); rows = data.rows; cols = data.cols;
            seatMapData = JSON.parse(data.grid).map(r => r.map(c => typeof c === 'number' ? {type: c, label: ""} : c));
            renderDailySupervisorMap();
        }
    }

    function loadDailyDataAndRender() {
        const dateStr = document.getElementById('daily-date').value;
        db.collection("attendance_logs").where("date", "==", dateStr).onSnapshot(snap => {
            attendanceLogsData = {}; snap.forEach(doc => attendanceLogsData[doc.data().stuId] = doc.data());
            renderDailySupervisorMap();
        });
    }

    function renderDailySupervisorMap() {
        if(seatMapData.length === 0) return;
        const container = document.getElementById('supervisor-grid');
        container.innerHTML = ''; container.style.gridTemplateColumns = `repeat(${cols}, 55px)`;
        const timeStr = document.getElementById('daily-time').value;
        const targetDayIdx = new Date(document.getElementById('daily-date').value).getDay();
        const targetDay = ['sun','mon','tue','wed','thu','fri','sat'][targetDayIdx];
        const cellEls = {};
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const d = seatMapData[r][c]; const div = document.createElement('div');
                div.className = `seat-cell seat-${d.type}`; div.innerText = d.label || "";
                if ((d.type === 1 || d.type === 2) && d.label) cellEls[d.label] = div;
                container.appendChild(div);
            }
        }
        Object.values(applicationData).forEach(d => {
            if(d.type === "고정석" && d[targetDay] && d[targetDay].includes(timeStr) && cellEls[d.seatNum]) {
                const target = cellEls[d.seatNum]; const log = attendanceLogsData[d.stuId];
                target.innerHTML = `${d.seatNum}<br><span style="font-size:12px;">${d.stuName}</span>`;
                if(log) target.classList.add('status-present-fixed'); else target.classList.add('status-absent');
            }
        });
    }

    function renderStatusTable() {
        const tbody = document.getElementById('status-body'); tbody.innerHTML = "";
        const month = document.getElementById('filter-month').value;
        Object.keys(applicationData).map(id => ({ docId: id, ...applicationData[id] })).sort((a,b) => a.stuId - b.stuId).forEach(d => {
            if(month !== "all" && d.targetMonth !== month) return;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td onclick="fillEditForm('${d.docId}')" style="cursor:pointer;">${d.targetMonth}</td><td onclick="fillEditForm('${d.docId}')" style="cursor:pointer; color:var(--primary);">${d.stuId}</td><td onclick="openCounsel('${d.docId}')" style="cursor:pointer; font-weight:bold;">${d.stuName}</td><td>${d.type}</td><td>${d.seatNum || '-'}</td><td>${d.mon||''}</td><td>${d.tue||''}</td><td>${d.wed||''}</td><td>${d.thu||''}</td><td>${d.fri||''}</td>`;
            tbody.appendChild(tr);
        });
    }

    function fillEditForm(docId) {
        const d = applicationData[docId]; if(!d) return;
        document.getElementById('edit-doc-id').value = docId;
        document.getElementById('m-month').value = d.targetMonth; document.getElementById('m-id').value = d.stuId; document.getElementById('m-name').value = d.stuName;
        document.getElementById('m-type').value = d.type; document.getElementById('m-seatNum').value = d.seatNum || "";
        document.getElementById('m-mon').value = d.mon || ""; document.getElementById('m-tue').value = d.tue || ""; document.getElementById('m-wed').value = d.wed || ""; document.getElementById('m-thu').value = d.thu || ""; document.getElementById('m-fri').value = d.fri || "";
        switchTab('tab-manual', document.querySelectorAll('.tab-btn')[2]);
    }

    async function saveManualEntry() {
        const docId = document.getElementById('edit-doc-id').value;
        const data = { targetMonth: document.getElementById('m-month').value, stuId: document.getElementById('m-id').value, stuName: document.getElementById('m-name').value, type: document.getElementById('m-type').value, seatNum: document.getElementById('m-seatNum').value, mon: document.getElementById('m-mon').value, tue: document.getElementById('m-tue').value, wed: document.getElementById('m-wed').value, thu: document.getElementById('m-thu').value, fri: document.getElementById('m-fri').value, lastUpdateTime: new Date() };
        if(docId) await db.collection("applications").doc(docId).update(data); else await db.collection("applications").add(data);
        resetManualForm(); switchTab('tab-status', document.querySelectorAll('.tab-btn')[1]);
    }

    function resetManualForm() { document.getElementById('edit-doc-id').value = ""; document.querySelectorAll('#tab-manual input').forEach(i => i.value = ""); }

    db.collection("applications").onSnapshot(snap => {
        applicationData = {}; snap.forEach(doc => applicationData[doc.id] = doc.data());
        renderDailySupervisorMap();
        if(document.getElementById('tab-status').classList.contains('active')) renderStatusTable();
    });

    loadSeatLayout(); loadDailyDataAndRender();
</script>
</body>
</html>
