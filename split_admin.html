<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 - 자율학습 통합 관리자</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --gray: #6c757d; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        h2 { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin: 0; }

        /* 상단 헤더 영역 */
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 탭 메뉴 */
        .tab-menu { display: flex; gap: 5px; margin-bottom: 25px; background: #eee; padding: 5px; border-radius: 10px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; min-width: 150px; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 버튼 스타일 */
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-primary { background: var(--primary); }
        .btn-gray { background: var(--gray); }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px 8px; text-align: center; }
        th { background: #f8f9fa; }
        tbody tr:hover { background-color: #f1f8ff; cursor: pointer; }

        /* 좌석 격자 */
        .seat-grid { display: grid; gap: 4px; justify-content: start; }
        .seat-cell { width: 55px; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-radius: 5px; border: 1px solid #ccc; }
        .status-absent { background: #fff; border: 2px dashed #adb5bd; color: #6c757d; }
        .status-present-fixed { background: #e7f1ff; border: 3px solid #0d6efd; color: #0d6efd; }
        .status-present-flex { background: #e8f5e9; border: 3px solid #198754; color: #198754; }

        /* 모달 (팝업창) */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2 style="flex-grow: 1;">안성여고 야간 자율학습 통합 관리</h2>
        <button class="btn" style="background:#6c757d;" onclick="location.href='settings.html'">⚙️ 환경설정</button>
    </div>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('tab-daily', this)">🧑‍🏫 오늘 감독용 좌석표</button>
        <button class="tab-btn" onclick="switchTab('tab-status', this)">📊 월별 신청 현황</button>
        <button class="tab-btn" onclick="switchTab('tab-period', this)">📅 신청 기간 설정</button>
        <button class="tab-btn" onclick="switchTab('tab-manual', this)">📝 개별 수정/추가</button>
    </div>

    <div id="tab-daily" class="tab-content active">
        <div style="text-align:center; background:#e3f2fd; padding:15px; border-radius:10px; margin-bottom:15px;">
            날짜: <input type="date" id="daily-date" onchange="loadDailyDataAndRender()">
            교시: <select id="daily-time" onchange="renderDailySupervisorMap()">
                <option value="1">1타임</option><option value="2">2타임</option><option value="3">3타임</option>
            </select>
            <button class="btn btn-primary" onclick="loadDailyDataAndRender()">데이터 동기화</button>
        </div>
        <div style="overflow-x:auto; background:white; padding:15px; border-radius:10px; border:1px solid #ddd;">
            <div id="supervisor-grid" class="seat-grid"></div>
        </div>
    </div>

    <div id="tab-status" class="tab-content">
        <div style="margin-bottom:10px;">
            <select id="filter-month" onchange="renderStatusTable()" style="padding:8px; border-radius:5px;">
                <option value="all">전체보기</option>
                <option value="3월">3월</option><option value="4월" selected>4월</option>
                <option value="5월">5월</option><option value="6월">6월</option>
            </select>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>월</th><th>학번</th><th>이름</th><th>종류</th><th>좌석</th><th>상태(월~금)</th></tr></thead>
                <tbody id="status-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-period" class="tab-content">
        <div style="background:#f8f9fa; padding:25px; border-radius:10px; border:1px solid #ddd;">
            <h3>📢 신청 기간 설정</h3>
            시작 일시: <input type="datetime-local" id="apply-start" style="padding:8px;"><br><br>
            종료 일시: <input type="datetime-local" id="apply-end" style="padding:8px;"><br><br>
            <button class="btn btn-primary" onclick="saveApplyPeriod()">저장 및 서버 배포</button>
        </div>
    </div>

    <div id="tab-manual" class="tab-content">
        <div style="background:#f8f9fa; padding:25px; border-radius:10px; border:1px solid #ddd;">
            <h3>✍️ 학생 데이터 수정</h3>
            <input type="hidden" id="edit-doc-id">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>학번: <input type="number" id="m-id" style="width:100%; padding:8px;"></div>
                <div>이름: <input type="text" id="m-name" style="width:100%; padding:8px;"></div>
            </div><br>
            <button class="btn btn-primary" style="width:100%;" onclick="saveManualEntry()">데이터 반영하기</button>
        </div>
    </div>
</div>

<div id="student-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>🧑‍🎓 학생 출결 상세</h3>
        <div id="modal-info" style="margin-bottom:15px; line-height:1.6; white-space: pre-wrap;"></div>
        <button class="btn btn-gray" style="width:100%" onclick="document.getElementById('student-modal').style.display='none'">닫기</button>
    </div>
</div>

<script>
    // --- 파이어베이스 설정 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBP6oveXbGlNn_0XqttHbU2ZDUYhH2nf4c",
        authDomain: "self-study-project-82bdf.firebaseapp.com",
        projectId: "self-study-project-82bdf",
        storageBucket: "self-study-project-82bdf.firebasestorage.app",
        messagingSenderId: "482006075036",
        appId: "1:482006075036:web:473445e0f86d48cd22cf59"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let applicationData = {}; let attendanceLogsData = {}; 
    let seatMapData = []; let rows = 20, cols = 30;

    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });
    document.getElementById('daily-date').value = todayStr;

    // --- [탭 관리] ---
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active'); btn.classList.add('active');
        if(tabId === 'tab-status') renderStatusTable();
        if(tabId === 'tab-period') loadApplyPeriod();
    }

    // --- [좌석 도면 및 출결 로직] ---
    async function loadSeatLayout() {
        const doc = await db.collection("settings").doc("seatLayout").get();
        if (doc.exists) {
            rows = doc.data().rows; cols = doc.data().cols;
            seatMapData = JSON.parse(doc.data().grid).map(r => r.map(c => typeof c === 'number' ? {type: c, label: ""} : c));
            renderDailySupervisorMap();
        }
    }

    function loadDailyDataAndRender() {
        const dateStr = document.getElementById('daily-date').value;
        db.collection("attendance_logs").where("date", "==", dateStr).onSnapshot(snap => {
            attendanceLogsData = {}; snap.forEach(doc => attendanceLogsData[doc.data().stuId] = doc.data());
            renderDailySupervisorMap();
        });
    }

    function renderDailySupervisorMap() {
        if(seatMapData.length === 0) return;
        const container = document.getElementById('supervisor-grid');
        container.innerHTML = ''; container.style.gridTemplateColumns = `repeat(${cols}, 55px)`;
        const timeStr = document.getElementById('daily-time').value;
        const targetDay = ['sun','mon','tue','wed','thu','fri','sat'][new Date(document.getElementById('daily-date').value).getDay()];
        
        const cellEls = {};
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const d = seatMapData[r][c]; const div = document.createElement('div');
                div.className = `seat-cell seat-${d.type}`; div.innerText = d.label || "";
                if (d.type === 1 || d.type === 2) cellEls[d.label] = div;
                container.appendChild(div);
            }
        }

        Object.values(applicationData).forEach(d => {
            if(d.type === "고정석" && d[targetDay] && d[targetDay].includes(timeStr) && cellEls[d.seatNum]) {
                const target = cellEls[d.seatNum];
                const log = attendanceLogsData[d.stuId];
                target.innerHTML = `${d.seatNum}<br>${d.stuName}`;
                target.className = 'seat-cell ' + (log ? 'status-present-fixed' : 'status-absent');
                if(log) target.onclick = () => {
                    document.getElementById('modal-info').innerText = `학번: ${d.stuId}\n성명: ${d.stuName}\n최근상태: ${log.status}\n\n[타임라인]\n${log.history.join('\n')}`;
                    document.getElementById('student-modal').style.display = 'flex';
                };
            }
        });
    }

    // --- [신청 현황 및 기간] ---
    function renderStatusTable() {
        const tbody = document.getElementById('status-body'); tbody.innerHTML = "";
        const month = document.getElementById('filter-month').value;
        const sortedData = Object.values(applicationData).sort((a,b) => a.stuId - b.stuId);
        sortedData.forEach(d => {
            if(month !== "all" && d.targetMonth !== month) return;
            tbody.innerHTML += `<tr><td>${d.targetMonth}</td><td>${d.stuId}</td><td>${d.stuName}</td><td>${d.type}</td><td>${d.seatNum}</td><td>${d.mon||'-'}..</td></tr>`;
        });
    }

    async function loadApplyPeriod() {
        const doc = await db.collection("settings").doc("applyPeriod").get();
        if(doc.exists) {
            document.getElementById('apply-start').value = doc.data().start;
            document.getElementById('apply-end').value = doc.data().end;
        }
    }

    async function saveApplyPeriod() {
        const start = document.getElementById('apply-start').value;
        const end = document.getElementById('apply-end').value;
        await db.collection("settings").doc("applyPeriod").set({ start, end, lastUpdated: new Date() });
        alert("기간 저장 완료!");
    }

    async function saveManualEntry() {
        const id = document.getElementById('edit-doc-id').value;
        const data = { stuId: document.getElementById('m-id').value, stuName: document.getElementById('m-name').value };
        if(id) await db.collection("applications").doc(id).update(data);
        alert("수정 완료");
    }

    // 실시간 감시
    db.collection("applications").onSnapshot(snap => {
        applicationData = {}; snap.forEach(doc => applicationData[doc.id] = doc.data());
        renderDailySupervisorMap();
    });

    loadSeatLayout(); loadDailyDataAndRender();
</script>
</body>
</html>
